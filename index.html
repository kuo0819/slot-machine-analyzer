<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>鋼鐵執行者 - 歷史最大化版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { touch-action: manipulation; -webkit-tap-highlight-color: transparent; -webkit-user-select: none; }
        body { background-color: #050505; color: white; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        .data-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); }
        .active-box { border-color: #3b82f6 !important; background: rgba(59, 130, 246, 0.15); box-shadow: 0 0 8px rgba(59, 130, 246, 0.2); }
        input { pointer-events: none; }
        .tab-active { color: #3b82f6; border-bottom: 2px solid #3b82f6; font-weight: 900; }
        .hidden-page { display: none; }
        .volt-flash { animation: pulse 0.8s infinite; }
        @keyframes pulse { 0% { opacity: 1; box-shadow: 0 0 15px currentColor; } 50% { opacity: 0.3; } 100% { opacity: 1; box-shadow: 0 0 15px currentColor; } }
        .tilt-mode { background-color: #450a0a !important; }
        .win-mode { background-color: #064e3b !important; }
        
        /* 歷史紀錄大字體 */
        .history-row { padding: 12px; margin-bottom: 8px; border-radius: 12px; background: rgba(255, 255, 255, 0.05); border-left-width: 6px; }
        .history-val { font-size: 20px; font-weight: 900; }
    </style>
</head>
<body class="p-2 font-sans">

    <div class="max-w-md w-full h-full flex flex-col mx-auto space-y-2">
        
        <div class="bg-[#111] rounded-[1.5rem] border border-gray-800 overflow-hidden flex-shrink-0">
            <div id="statusHeader" class="p-3 text-center bg-gray-900/50 border-b border-white/5 relative">
                <div class="absolute top-3 right-4 flex flex-col items-center">
                    <div id="voltLight" class="w-2.5 h-2.5 rounded-full bg-gray-600 mb-0.5"></div>
                    <span id="voltText" class="text-[7px] font-bold text-gray-500 uppercase">VOLT</span>
                </div>
                <h1 id="mainAction" class="text-xl font-black text-white">等待數據</h1>
                <div id="subText" class="text-[10px] text-blue-400 font-bold uppercase">System Ready</div>
            </div>

            <div class="flex justify-around border-b border-white/5 bg-black/20">
                <button onclick="switchPage('room')" id="tabRoom" class="flex-1 py-2 text-[11px] text-gray-500 tab-active">房間診斷</button>
                <button onclick="switchPage('live')" id="tabLive" class="flex-1 py-2 text-[11px] text-gray-500">測速策略</button>
            </div>

            <div id="pageRoom" class="p-3 space-y-2">
                <div class="grid grid-cols-4 gap-1">
                    <div onclick="setActiveInput('dayRtp')" id="boxDayRtp" class="data-card p-1.5 rounded-lg text-center"><p class="text-[8px] text-gray-500 font-bold">當日RTP</p><input type="number" id="dayRtp" class="bg-transparent text-sm font-bold text-white w-full text-center outline-none"></div>
                    <div onclick="setActiveInput('dayBet')" id="boxDayBet" class="data-card p-1.5 rounded-lg text-center"><p class="text-[8px] text-gray-500 font-bold">當日投</p><input type="number" id="dayBet" class="bg-transparent text-sm font-bold text-white w-full text-center outline-none"></div>
                    <div onclick="setActiveInput('monthRtp')" id="boxMonthRtp" class="data-card p-1.5 rounded-lg text-center"><p class="text-[8px] text-gray-400 font-bold">30日RTP</p><input type="number" id="monthRtp" class="bg-transparent text-sm font-bold text-gray-400 w-full text-center outline-none"></div>
                    <div onclick="setActiveInput('monthBet')" id="boxMonthBet" class="data-card p-1.5 rounded-lg text-center"><p class="text-[8px] text-gray-400 font-bold">30日投</p><input type="number" id="monthBet" class="bg-transparent text-sm font-bold text-gray-400 w-full text-center outline-none"></div>
                </div>
                <button onclick="runDeepAnalysis()" class="w-full py-2.5 bg-indigo-600 rounded-xl font-black text-white text-sm shadow-lg">啟動深度分析</button>
            </div>

            <div id="pageLive" class="p-3 space-y-2 hidden-page">
                <div class="grid grid-cols-4 gap-1">
                    <div onclick="setActiveInput('initCap')" id="boxInitCap" class="data-card p-1.5 rounded-lg text-center"><p class="text-[8px] text-gray-500 font-bold">本金</p><input type="number" id="initCap" value="1000" class="bg-transparent text-xs font-bold text-white w-full text-center outline-none"></div>
                    <div onclick="setActiveInput('targetX')" id="boxTargetX" class="data-card p-1.5 rounded-lg text-center border-green-500/30"><p class="text-[8px] text-green-400 font-bold">止盈X</p><input type="number" id="targetX" value="2" class="bg-transparent text-xs font-bold text-green-400 w-full text-center outline-none"></div>
                    <div onclick="setActiveInput('baseBet')" id="boxBaseBet" class="data-card p-1.5 rounded-lg text-center"><p class="text-[8px] text-gray-500 font-bold">基準</p><input type="number" id="baseBet" value="10" class="bg-transparent text-xs font-bold text-white w-full text-center outline-none"></div>
                    <div onclick="setActiveInput('spinT')" id="boxSpinT" class="data-card p-1.5 rounded-lg text-center"><p class="text-[8px] text-blue-400 font-bold">轉數</p><input type="number" id="spinT" value="50" class="bg-transparent text-xs font-bold text-blue-400 w-full text-center outline-none"></div>
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <div onclick="setActiveInput('sBal')" id="boxSBal" class="data-card p-2 rounded-xl border border-blue-600 text-center"><p class="text-[9px] text-gray-500 font-bold uppercase">前餘額</p><input type="number" id="sBal" class="w-full bg-transparent text-xl font-black text-center outline-none"></div>
                    <div onclick="setActiveInput('eBal')" id="boxEBal" class="data-card p-2 rounded-xl border border-transparent text-center"><p class="text-[9px] text-gray-500 font-bold uppercase">後餘額</p><input type="number" id="eBal" class="w-full bg-transparent text-xl font-black text-center outline-none"></div>
                </div>
                <button onclick="runLiveStrategy()" class="w-full py-2.5 bg-blue-600 rounded-xl font-black text-white text-sm">計算策略</button>
            </div>

            <div class="p-3 pt-0 grid grid-cols-6 gap-1 flex-shrink-0">
                <button onclick="pressKey('1')" class="py-3 bg-white/5 rounded-lg font-bold">1</button>
                <button onclick="pressKey('2')" class="py-3 bg-white/5 rounded-lg font-bold">2</button>
                <button onclick="pressKey('3')" class="py-3 bg-white/5 rounded-lg font-bold">3</button>
                <button onclick="pressKey('4')" class="py-3 bg-white/5 rounded-lg font-bold">4</button>
                <button onclick="pressKey('5')" class="py-3 bg-white/5 rounded-lg font-bold">5</button>
                <button onclick="pressKey('6')" class="py-3 bg-white/5 rounded-lg font-bold">6</button>
                <button onclick="pressKey('7')" class="py-3 bg-white/5 rounded-lg font-bold">7</button>
                <button onclick="pressKey('8')" class="py-3 bg-white/5 rounded-lg font-bold">8</button>
                <button onclick="pressKey('9')" class="py-3 bg-white/5 rounded-lg font-bold">9</button>
                <button onclick="pressKey('C')" class="py-3 bg-red-900/20 text-red-500 rounded-lg font-bold">C</button>
                <button onclick="pressKey('0')" class="py-3 bg-white/5 rounded-lg font-bold">0</button>
                <button onclick="resetAll()" class="py-3 bg-gray-800 rounded-lg font-bold text-[8px]">重置</button>
            </div>
        </div>

        <div class="flex-grow flex flex-col min-h-0 bg-[#111] rounded-[1.5rem] border border-white/5">
            <div class="p-3 border-b border-white/5 flex justify-between items-center flex-shrink-0">
                <span class="text-[10px] font-black text-gray-500 uppercase tracking-widest">實戰歷史紀錄簿</span>
                <div class="flex space-x-3 text-[10px] font-bold">
                    <span id="miniSpins" class="text-blue-400">0 T</span>
                    <span id="miniRtp" class="text-green-400">0%</span>
                </div>
            </div>
            <div id="historyList" class="flex-grow overflow-y-auto p-3">
                </div>
        </div>
    </div>

    <script>
        let currentInputId = 'dayRtp', isFirstKey = true;
        let cycle = 0, lastLiveRtp = null, lossStreak = 0;
        let totalSpins = 0, totalBetAmount = 0, totalReturnAmount = 0;

        window.onload = () => {
            const saved = localStorage.getItem('steel_executor_data');
            if (saved) {
                const data = JSON.parse(saved);
                totalSpins = data.spins || 0;
                totalBetAmount = data.bet || 0;
                totalReturnAmount = data.ret || 0;
                updateBattleDisplay();
            }
        };

        function switchPage(page) {
            document.getElementById('pageRoom').classList.toggle('hidden-page', page !== 'room');
            document.getElementById('pageLive').classList.toggle('hidden-page', page !== 'live');
            document.getElementById('tabRoom').classList.toggle('tab-active', page === 'room');
            document.getElementById('tabLive').classList.toggle('tab-active', page === 'live');
            setActiveInput(page === 'room' ? 'dayRtp' : 'sBal');
        }

        function setActiveInput(id) {
            currentInputId = id; isFirstKey = true;
            document.querySelectorAll('.data-card').forEach(box => box.classList.remove('active-box'));
            const boxId = 'box' + id.charAt(0).toUpperCase() + id.slice(1);
            if(document.getElementById(boxId)) document.getElementById(boxId).classList.add('active-box');
        }

        function pressKey(key) {
            const input = document.getElementById(currentInputId);
            if (!input) return;
            if (key === 'C') { input.value = ''; isFirstKey = false; } 
            else {
                if (isFirstKey) { input.value = key; isFirstKey = false; } 
                else { input.value += key; }
            }
        }

        function updateBattleDisplay() {
            const globalRtp = totalBetAmount > 0 ? (totalReturnAmount / totalBetAmount) * 100 : 0;
            document.getElementById('miniSpins').innerText = totalSpins + " T";
            document.getElementById('miniRtp').innerText = globalRtp.toFixed(1) + "%";
            localStorage.setItem('steel_executor_data', JSON.stringify({ spins: totalSpins, bet: totalBetAmount, ret: totalReturnAmount }));
        }

        function runLiveStrategy() {
            const init = parseFloat(document.getElementById('initCap').value);
            const targetX = parseFloat(document.getElementById('targetX').value);
            const bet = parseFloat(document.getElementById('baseBet').value);
            const s = parseFloat(document.getElementById('sBal').value);
            const e = parseFloat(document.getElementById('eBal').value);
            const t = parseFloat(document.getElementById('spinT').value);
            if (isNaN(e)) return;

            const roundBet = bet * t;
            const roundReturn = e - s + roundBet;
            const rtp = (roundReturn / roundBet) * 100;

            totalSpins += t;
            totalBetAmount += roundBet;
            totalReturnAmount += roundReturn;
            updateBattleDisplay();

            if (e >= (init * targetX)) { document.body.classList.add('win-mode'); updateStatus("目標達成", "收手離場", "#fff"); }

            let m = 1.0, res = "平打", col = "#3b82f6";
            if (rtp >= 160) { m = 3.0; res = "倍數 3X"; col = "#a855f7"; }
            else if (rtp >= 120) { m = 2.0; res = "強力 2X"; col = "#ec4899"; }
            else if (rtp < 80) { m = 0.2; res = "避險 0.2X"; col = "#ef4444"; }

            updateStatus("建議注碼", `$ ${(bet * m).toFixed(1)}`, col);
            addHistory(`測速 #${++cycle}`, `RTP: ${rtp.toFixed(1)}%`, res, col);
            document.getElementById('sBal').value = e;
            document.getElementById('eBal').value = '';
            setActiveInput('eBal');
        }

        function runDeepAnalysis() {
            const dR = parseFloat(document.getElementById('dayRtp').value) || 0;
            const mR = parseFloat(document.getElementById('monthRtp').value) || 0;
            const diff = dR - mR;
            let res = "數據平穩", col = "#22c55e";
            if (diff > 5) { res = "起漲訊號 🚀", col = "#a855f7"; }
            else if (dR < 88) { res = "避開陷阱 ⛔", col = "#ef4444"; }
            updateStatus("分析結果", res, col);
            addHistory("診斷", `差值: ${diff.toFixed(1)}%`, res, col);
        }

        function updateStatus(main, sub, col) {
            document.getElementById('mainAction').innerText = main;
            document.getElementById('mainAction').style.color = col;
            document.getElementById('subText').innerText = sub;
            document.getElementById('subText').style.color = col;
        }

        function addHistory(type, data, res, col) {
            const list = document.getElementById('historyList');
            const row = document.createElement('div');
            row.className = 'history-row';
            row.style.borderColor = col;
            row.innerHTML = `
                <div class="flex justify-between items-center">
                    <div>
                        <div class="text-[10px] text-gray-500 font-bold uppercase">${type}</div>
                        <div class="history-val" style="color:${col}">${res}</div>
                        <div class="text-[12px] text-gray-400 font-bold">${data}</div>
                    </div>
                    <div class="text-[10px] text-gray-600 font-mono">${new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</div>
                </div>
            `;
            list.prepend(row);
        }

        function resetAll() { if(confirm("確定重置數據？")) { localStorage.removeItem('steel_executor_data'); location.reload(); } }
    </script>
</body>
</html>
