<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>鋼鐵執行者 - RTP 2.0 函數整合版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; }
        .data-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); transition: all 0.3s; }
        .progress-bar { height: 100%; transition: width 0.5s ease; }
        .lock-overlay { animation: pulse 1s infinite !important; filter: grayscale(1) !important; pointer-events: none !important; }
        @keyframes pulse { 0% { background-color: #450a0a; } 50% { background-color: #7f1d1d; } 100% { background-color: #450a0a; } }
        .win-lock-overlay { animation: winPulse 1s infinite !important; pointer-events: none !important; }
        @keyframes winPulse { 0% { background-color: #064e3b; } 50% { background-color: #065f46; } 100% { background-color: #064e3b; } }
        body { -webkit-tap-highlight-color: transparent; background-color: #050505; color: white; overflow-x: hidden; }
        .signal-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 6px; }
        #historyList::-webkit-scrollbar { display: none; }
        .active-box { border-color: #3b82f6 !important; background: rgba(59, 130, 246, 0.1); }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4 font-sans select-none pb-12">

    <div class="max-w-md w-full space-y-4">
        <div id="mainContainer" class="bg-[#111] rounded-[2.5rem] overflow-hidden border border-gray-800 shadow-2xl">
            <div id="statusBg" class="p-6 text-center bg-gray-900 border-b border-white/5 transition-all">
                <div class="flex justify-between items-center mb-1">
                    <span id="spinCounter" class="text-[10px] font-mono text-gray-500">週期: 0</span>
                    <button onclick="resetData()" class="px-2 py-0.5 rounded text-[10px] font-black bg-red-900/40 text-red-400 border border-red-900/50 active:scale-95">自動清除模組</button>
                </div>
                <h1 class="text-2xl font-black mb-1 flex items-center justify-center">
                    <span id="statusIndicator" class="signal-dot bg-gray-600"></span>
                    <span id="mainStatus">等待數據輸入</span>
                </h1>
                <div class="flex justify-center gap-2 items-center">
                    <p id="totalPlDisplay" class="text-[10px] font-bold text-gray-500 uppercase tracking-widest">總損益: 0</p>
                    <span id="trendTag" class="text-[9px] px-1 bg-white/5 rounded text-gray-500">穩定</span>
                </div>
                <div class="mt-4 px-4">
                    <div class="bg-white/5 h-1.5 rounded-full overflow-hidden">
                        <div id="progressBar" class="progress-bar w-0 bg-blue-500"></div>
                    </div>
                </div>
            </div>

            <div class="p-5 space-y-4">
                <div class="grid grid-cols-4 gap-2">
                    <div onclick="setActiveInput('initialCapital')" id="boxCapital" class="data-card p-2 rounded-xl text-center border-2 border-transparent">
                        <p class="text-[9px] text-gray-500 mb-1 font-bold">初始本金</p>
                        <input type="number" id="initialCapital" value="1000" class="bg-transparent text-xs font-mono font-bold text-white outline-none w-full text-center pointer-events-none" readonly>
                    </div>
                    <div onclick="setActiveInput('targetGoal')" id="boxGoal" class="data-card p-2 rounded-xl text-center border-2 border-transparent">
                        <p class="text-[9px] text-green-400 mb-1 font-bold">止盈目標</p>
                        <input type="number" id="targetGoal" class="bg-transparent text-xs font-mono font-bold text-green-400 outline-none w-full text-center pointer-events-none" readonly>
                    </div>
                    <div onclick="setActiveInput('currentBet')" id="boxBet" class="data-card p-2 rounded-xl text-center border-2 border-transparent">
                        <p class="text-[9px] text-gray-500 mb-1 font-bold">單注金額</p>
                        <input type="number" id="currentBet" value="1" class="bg-transparent text-xs font-mono font-bold text-white outline-none w-full text-center pointer-events-none" readonly>
                    </div>
                    <div onclick="setActiveInput('customSpins')" id="boxSpins" class="data-card p-2 rounded-xl text-center border-2 border-transparent">
                        <p class="text-[9px] text-blue-400 mb-1 font-bold">計算轉數</p>
                        <input type="number" id="customSpins" value="100" class="bg-transparent text-xs font-mono font-bold text-blue-400 outline-none w-full text-center pointer-events-none" readonly>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div onclick="setActiveInput('startBalance')" id="boxStart" class="data-card p-4 rounded-2xl border-2 border-blue-600 text-center">
                        <p id="labelStart" class="text-[10px] text-gray-500 mb-1 font-bold">100轉前金額</p>
                        <input type="number" id="startBalance" class="w-full bg-transparent text-2xl font-bold outline-none text-center pointer-events-none" placeholder="0" readonly>
                    </div>
                    <div onclick="setActiveInput('endBalance')" id="boxEnd" class="data-card p-4 rounded-2xl border-2 border-transparent text-center">
                        <p id="labelEnd" class="text-[10px] text-gray-500 mb-1 font-bold">100轉後金額</p>
                        <input type="number" id="endBalance" class="w-full bg-transparent text-2xl font-bold outline-none text-center pointer-events-none" placeholder="0" readonly>
                    </div>
                </div>

                <div class="bg-white/[0.02] p-4 rounded-3xl border border-white/10 flex justify-between items-center px-6">
                    <div>
                        <p class="text-[9px] text-gray-500 font-bold mb-1 uppercase">RTP 函數階級</p>
                        <div class="flex items-baseline gap-2">
                            <p id="rtpDisplay" class="text-xl font-mono font-bold text-gray-400">---%</p>
                            <span id="rankDisplay" class="text-[10px] font-black px-1.5 py-0.5 rounded bg-gray-800 text-gray-400">階級 --</span>
                        </div>
                    </div>
                    <div class="text-right">
                        <p class="text-[9px] text-blue-500 font-bold mb-1 uppercase">建議注碼</p>
                        <p id="targetBetDisplay" class="text-4xl font-black text-white">$ ---</p>
                    </div>
                </div>

                <div id="keypad" class="grid grid-cols-3 gap-2">
                    <button onclick="pressKey('1')" class="py-4 bg-white/5 rounded-2xl font-bold text-xl active:scale-95">1</button>
                    <button onclick="pressKey('2')" class="py-4 bg-white/5 rounded-2xl font-bold text-xl active:scale-95">2</button>
                    <button onclick="pressKey('3')" class="py-4 bg-white/5 rounded-2xl font-bold text-xl active:scale-95">3</button>
                    <button onclick="pressKey('4')" class="py-4 bg-white/5 rounded-2xl font-bold text-xl active:scale-95">4</button>
                    <button onclick="pressKey('5')" class="py-4 bg-white/5 rounded-2xl font-bold text-xl active:scale-95">5</button>
                    <button onclick="pressKey('6')" class="py-4 bg-white/5 rounded-2xl font-bold text-xl active:scale-95">6</button>
                    <button onclick="pressKey('7')" class="py-4 bg-white/5 rounded-2xl font-bold text-xl active:scale-95">7</button>
                    <button onclick="pressKey('8')" class="py-4 bg-white/5 rounded-2xl font-bold text-xl active:scale-95">8</button>
                    <button onclick="pressKey('9')" class="py-4 bg-white/5 rounded-2xl font-bold text-xl active:scale-95">9</button>
                    <button onclick="pressKey('C')" class="py-4 bg-red-900/20 text-red-500 rounded-2xl font-bold text-lg">C</button>
                    <button onclick="pressKey('0')" class="py-4 bg-white/5 rounded-2xl font-bold text-xl">0</button>
                    <button id="okBtn" onclick="calculate()" class="py-4 bg-blue-600 rounded-2xl font-bold uppercase shadow-lg shadow-blue-900/40">確認</button>
                </div>
            </div>
        </div>

        <div id="historyList" class="bg-[#111] rounded-3xl border border-white/5 max-h-40 overflow-y-auto"></div>
    </div>

    <script>
        let currentInputId = 'startBalance';
        let cycleCount = 0;
        let isLocked = false;
        let rtpHistory = [];
        let lastRtp = 0;

        // 影片功能 1: 六階分界制度 (RTP 階級)
        const RTP_RANKS = [
            { min: 180, label: "階級 6 (狂暴)", color: "#a855f7", m: 2.0 },
            { min: 140, label: "階級 5 (大熱)", color: "#ec4899", m: 1.5 },
            { min: 100, label: "階級 4 (回溫)", color: "#22c55e", m: 1.2 },
            { min: 80, label: "階級 3 (洗盤)", color: "#3b82f6", m: 1.0 },
            { min: 50, label: "階級 2 (失溫)", color: "#f59e0b", m: 0.5 },
            { min: 0, label: "階級 1 (極凍)", color: "#ef4444", m: 0.2 }
        ];

        function getRank(rtp) {
            return RTP_RANKS.find(r => rtp >= r.min) || RTP_RANKS[RTP_RANKS.length - 1];
        }

        // 影片功能 2: 自動清除模組
        function resetData() {
            if(!confirm("確定要清除所有數據重開一局嗎？")) return;
            cycleCount = 0;
            rtpHistory = [];
            lastRtp = 0;
            document.getElementById('historyList').innerHTML = '';
            document.getElementById('totalPlDisplay').innerText = "總損益: 0";
            document.getElementById('spinCounter').innerText = "週期: 0";
            document.getElementById('mainStatus').innerText = "數據已清除";
            document.getElementById('rtpDisplay').innerText = "---%";
            document.getElementById('targetBetDisplay').innerText = "$ ---";
        }

        function setActiveInput(id) {
            if (isLocked) return;
            currentInputId = id;
            document.querySelectorAll('.data-card').forEach(box => box.classList.remove('active-box'));
            const activeBoxId = id === 'initialCapital' ? 'boxCapital' : id === 'targetGoal' ? 'boxGoal' : id === 'currentBet' ? 'boxBet' : id === 'customSpins' ? 'boxSpins' : id === 'startBalance' ? 'boxStart' : 'boxEnd';
            document.getElementById(activeBoxId).classList.add('active-box');
        }

        function pressKey(key) {
            if (isLocked) return;
            const input = document.getElementById(currentInputId);
            if (key === 'C') input.value = ''; else input.value += key;
            if (currentInputId === 'customSpins') {
                const val = input.value || '0';
                document.getElementById('labelStart').innerText = `${val}轉前金額`;
                document.getElementById('labelEnd').innerText = `${val}轉後金額`;
            }
        }

        function calculate() {
            if (isLocked) return;
            const capital = parseFloat(document.getElementById('initialCapital').value);
            const goal = parseFloat(document.getElementById('targetGoal').value);
            const start = parseFloat(document.getElementById('startBalance').value);
            const end = parseFloat(document.getElementById('endBalance').value);
            const bet = parseFloat(document.getElementById('currentBet').value);
            const spins = parseFloat(document.getElementById('customSpins').value) || 100;

            if (isNaN(start) || isNaN(end)) return;

            const profit = end - start;
            const rtp = ((profit + (bet * spins)) / (bet * spins)) * 100;
            const totalPl = end - capital;

            // 影片功能 3: 升降分視覺化判斷 (Trend)
            const trend = rtp > lastRtp ? "上升 ⬆️" : "下降 ⬇️";
            const trendColor = rtp > lastRtp ? "#4ade80" : "#fb7185";
            lastRtp = rtp;

            const rank = getRank(rtp);
            cycleCount++;

            // 更新 UI
            updateUI(rtp, totalPl, end, capital, goal, rank, trend, trendColor);

            // 計算注碼 (基礎倍率 * 趨勢加成)
            let m = rank.m;
            if (trend.includes("上升") && rtp > 100) m *= 1.2; // 順勢加注

            const nextBet = (bet * m).toFixed(1);
            document.getElementById('targetBetDisplay').innerText = "$ " + nextBet;

            addHistory(rtp, profit, nextBet, rank.label, spins);
            
            document.getElementById('startBalance').value = end;
            document.getElementById('endBalance').value = '';
            setActiveInput('endBalance');
        }

        function updateUI(rtp, totalPl, end, capital, goal, rank, trend, trendColor) {
            const rtpEl = document.getElementById('rtpDisplay');
            rtpEl.innerText = rtp.toFixed(1) + "%";
            rtpEl.style.color = rank.color;

            const rankEl = document.getElementById('rankDisplay');
            rankEl.innerText = rank.label;
            rankEl.style.backgroundColor = rank.color + "33";
            rankEl.style.color = rank.color;

            document.getElementById('mainStatus').innerText = rank.label.split(' ')[2];
            document.getElementById('statusIndicator').style.backgroundColor = rank.color;
            
            const trendEl = document.getElementById('trendTag');
            trendEl.innerText = trend;
            trendEl.style.color = trendColor;

            document.getElementById('totalPlDisplay').innerText = `總損益: ${totalPl.toFixed(0)}`;
            document.getElementById('spinCounter').innerText = `週期: ${cycleCount}`;
            
            let progress = ((end - (capital * 0.5)) / (goal - (capital * 0.5))) * 100;
            document.getElementById('progressBar').style.width = Math.min(Math.max(progress, 0), 100) + "%";
        }

        function addHistory(rtp, profit, target, rankLabel, spins) {
            const list = document.getElementById('historyList');
            const row = document.createElement('div');
            row.className = 'p-3 border-b border-white/5 flex justify-between items-center text-[11px]';
            row.innerHTML = `
                <div class="flex flex-col">
                    <span class="text-gray-500">#${cycleCount} (${spins}T)</span>
                    <span style="color:${getRank(rtp).color}">${rankLabel}</span>
                </div>
                <b class="font-mono text-sm">${rtp.toFixed(1)}%</b>
                <div class="${profit>=0?'text-green-400':'text-red-400'} font-bold">${profit>=0?'+':''}${profit.toFixed(0)}</div>
                <div class="text-blue-400 font-black">$ ${target}</div>
            `;
            list.prepend(row);
        }
    </script>
</body>
</html>
