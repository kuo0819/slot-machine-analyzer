<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>鋼鐵執行者 - 終極整合版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { touch-action: manipulation; -webkit-tap-highlight-color: transparent; -webkit-user-select: none; }
        body { background-color: #050505; color: white; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        .data-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); transition: all 0.2s; }
        .active-box { border-color: #3b82f6 !important; background: rgba(59, 130, 246, 0.15); box-shadow: 0 0 10px rgba(59, 130, 246, 0.2); }
        input { pointer-events: none; }
        .tab-active { color: #3b82f6; border-bottom: 2px solid #3b82f6; }
        #historyList::-webkit-scrollbar { display: none; }
        .hidden-page { display: none; }
    </style>
</head>
<body class="p-3 font-sans">

    <div class="max-w-md w-full h-full flex flex-col mx-auto space-y-3">
        
        <div class="flex justify-around bg-[#111] rounded-xl overflow-hidden border border-white/5 flex-shrink-0">
            <button onclick="switchPage('room')" id="tabRoom" class="flex-1 py-3 text-xs font-black text-gray-500 tab-active">房間深度診斷</button>
            <button onclick="switchPage('live')" id="tabLive" class="flex-1 py-3 text-xs font-black text-gray-500">即時測速策略</button>
        </div>

        <div class="bg-[#111] rounded-[2rem] border border-gray-800 flex-shrink-0 overflow-hidden">
            <div id="statusHeader" class="p-4 text-center bg-gray-900/50 border-b border-white/5">
                <div id="topTag" class="text-[9px] font-black tracking-widest text-gray-500 uppercase">SYSTEM READY</div>
                <h1 id="mainAction" class="text-xl font-black my-1 text-white">等待數據輸入</h1>
                <div id="subText" class="text-[11px] text-blue-400 font-bold">請選擇下方分頁開始</div>
            </div>

            <div id="pageRoom" class="p-4 space-y-4">
                <div class="grid grid-cols-3 gap-2">
                    <div onclick="setActiveInput('dayRtp')" id="boxDayRtp" class="data-card p-2 rounded-xl text-center cursor-pointer">
                        <p class="text-[8px] text-gray-500 font-bold uppercase">當日 RTP</p>
                        <input type="number" id="dayRtp" placeholder="%" class="bg-transparent text-xs font-bold text-white w-full text-center outline-none">
                    </div>
                    <div onclick="setActiveInput('monthRtp')" id="boxMonthRtp" class="data-card p-2 rounded-xl text-center cursor-pointer">
                        <p class="text-[8px] text-gray-500 font-bold uppercase">30日 RTP</p>
                        <input type="number" id="monthRtp" placeholder="%" class="bg-transparent text-xs font-bold text-white w-full text-center outline-none">
                    </div>
                    <div onclick="setActiveInput('totalBet')" id="boxTotalBet" class="data-card p-2 rounded-xl text-center cursor-pointer">
                        <p class="text-[8px] text-gray-500 font-bold uppercase">總投注(萬)</p>
                        <input type="number" id="totalBet" placeholder="0" class="bg-transparent text-xs font-bold text-white w-full text-center outline-none">
                    </div>
                </div>
                <button onclick="runRoomAnalysis()" class="w-full py-3 bg-indigo-600 rounded-xl font-black text-white shadow-lg active:scale-95 transition-transform">分析房間體質</button>
            </div>

            <div id="pageLive" class="p-4 space-y-4 hidden-page">
                <div class="grid grid-cols-4 gap-2 mb-2">
                    <div onclick="setActiveInput('initCap')" id="boxInitCap" class="data-card p-2 rounded-lg text-center cursor-pointer">
                        <p class="text-[8px] text-gray-500 font-bold">本金</p>
                        <input type="number" id="initCap" value="1000" class="bg-transparent text-[10px] font-bold text-white w-full text-center outline-none">
                    </div>
                    <div onclick="setActiveInput('baseBet')" id="boxBaseBet" class="data-card p-2 rounded-lg text-center cursor-pointer">
                        <p class="text-[8px] text-gray-500 font-bold">基準注</p>
                        <input type="number" id="baseBet" value="10" class="bg-transparent text-[10px] font-bold text-white w-full text-center outline-none">
                    </div>
                    <div onclick="setActiveInput('spinT')" id="boxSpinT" class="data-card p-2 rounded-lg text-center cursor-pointer">
                        <p class="text-[8px] text-blue-400 font-bold">轉數</p>
                        <input type="number" id="spinT" value="50" class="bg-transparent text-[10px] font-bold text-blue-400 w-full text-center outline-none">
                    </div>
                    <div class="data-card p-2 rounded-lg text-center opacity-50">
                        <p class="text-[8px] text-gray-500 font-bold">損益</p>
                        <div id="livePl" class="text-[10px] font-bold">0</div>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div onclick="setActiveInput('sBal')" id="boxSBal" class="data-card p-3 rounded-2xl border-2 border-blue-600 text-center cursor-pointer">
                        <p class="text-[9px] text-gray-500 font-bold">前餘額</p>
                        <input type="number" id="sBal" class="w-full bg-transparent text-xl font-black text-center outline-none" placeholder="0">
                    </div>
                    <div onclick="setActiveInput('eBal')" id="boxEBal" class="data-card p-3 rounded-2xl border-2 border-transparent text-center cursor-pointer">
                        <p class="text-[9px] text-gray-500 font-bold">後餘額</p>
                        <input type="number" id="eBal" class="w-full bg-transparent text-xl font-black text-center outline-none" placeholder="0">
                    </div>
                </div>
                <button onclick="runLiveStrategy()" class="w-full py-3 bg-blue-600 rounded-xl font-black text-white shadow-lg active:scale-95 transition-transform">計算下一手策略</button>
            </div>

            <div class="p-4 pt-0 grid grid-cols-3 gap-1.5">
                <button onclick="pressKey('1')" class="py-3 bg-white/5 rounded-xl font-bold active:bg-blue-500 transition-colors">1</button>
                <button onclick="pressKey('2')" class="py-3 bg-white/5 rounded-xl font-bold active:bg-blue-500 transition-colors">2</button>
                <button onclick="pressKey('3')" class="py-3 bg-white/5 rounded-xl font-bold active:bg-blue-500 transition-colors">3</button>
                <button onclick="pressKey('4')" class="py-3 bg-white/5 rounded-xl font-bold active:bg-blue-500 transition-colors">4</button>
                <button onclick="pressKey('5')" class="py-3 bg-white/5 rounded-xl font-bold active:bg-blue-500 transition-colors">5</button>
                <button onclick="pressKey('6')" class="py-3 bg-white/5 rounded-xl font-bold active:bg-blue-500 transition-colors">6</button>
                <button onclick="pressKey('7')" class="py-3 bg-white/5 rounded-xl font-bold active:bg-blue-500 transition-colors">7</button>
                <button onclick="pressKey('8')" class="py-3 bg-white/5 rounded-xl font-bold active:bg-blue-500 transition-colors">8</button>
                <button onclick="pressKey('9')" class="py-3 bg-white/5 rounded-xl font-bold active:bg-blue-500 transition-colors">9</button>
                <button onclick="pressKey('C')" class="py-3 bg-red-900/10 text-red-500 rounded-xl font-bold">C</button>
                <button onclick="pressKey('0')" class="py-3 bg-white/5 rounded-xl font-bold active:bg-blue-500 transition-colors">0</button>
                <button onclick="resetAll()" class="py-3 bg-gray-700 rounded-xl font-bold active:bg-gray-600 text-xs">重置數據</button>
            </div>
        </div>

        <div id="historyList" class="flex-grow bg-[#111] rounded-2xl border border-white/5 overflow-y-auto p-2 space-y-2"></div>
    </div>

    <script>
        let currentInputId = 'dayRtp';
        let cycle = 0;

        function switchPage(page) {
            document.getElementById('pageRoom').classList.toggle('hidden-page', page !== 'room');
            document.getElementById('pageLive').classList.toggle('hidden-page', page !== 'live');
            document.getElementById('tabRoom').classList.toggle('tab-active', page === 'room');
            document.getElementById('tabLive').classList.toggle('tab-active', page === 'live');
            setActiveInput(page === 'room' ? 'dayRtp' : 'sBal');
        }

        function setActiveInput(id) {
            currentInputId = id;
            document.querySelectorAll('.data-card').forEach(box => box.classList.remove('active-box'));
            const boxId = 'box' + id.charAt(0).toUpperCase() + id.slice(1);
            if(document.getElementById(boxId)) document.getElementById(boxId).classList.add('active-box');
        }

        function pressKey(key) {
            const input = document.getElementById(currentInputId);
            if (!input) return;
            if (key === 'C') input.value = ''; else input.value += key;
        }

        function runRoomAnalysis() {
            const d = parseFloat(document.getElementById('dayRtp').value) || 0;
            const m = parseFloat(document.getElementById('monthRtp').value) || 0;
            const t = parseFloat(document.getElementById('totalBet').value) || 0;
            
            let res = "數據不足";
            let adv = "請輸入完整數據";
            let col = "#9ca3af";

            if (d > m && m < 95) {
                res = "黃金起漲房 🚀";
                adv = "低位反彈訊號，建議進場測試";
                col = "#a855f7";
            } else if (d < m && m > 105) {
                res = "能量枯竭房 ⚠️";
                adv = "噴發期已過，目前為吸分週期";
                col = "#ef4444";
            } else {
                res = "穩定洗盤房 ⚖️";
                adv = "適合穩定小注磨免遊";
                col = "#22c55e";
            }

            updateStatus("房間診斷結果", res, adv, col);
            addHistory("診斷", `${d}% / ${m}%`, res, col);
        }

        function runLiveStrategy() {
            const cap = parseFloat(document.getElementById('initCap').value) || 0;
            const bet = parseFloat(document.getElementById('baseBet').value) || 0;
            const s = parseFloat(document.getElementById('sBal').value) || 0;
            const e = parseFloat(document.getElementById('eBal').value) || 0;
            const t = parseFloat(document.getElementById('spinT').value) || 50;

            if (s === 0 || e === 0) return;

            const rtp = ((e - s + (bet * t)) / (bet * t)) * 100;
            let m = 1.0;
            let res = "洗盤模式";
            let col = "#3b82f6";

            if (rtp >= 160) { m = 3.0; res = "倍數跳躍 3X"; col = "#a855f7"; }
            else if (rtp >= 120) { m = 2.0; res = "強力追擊 2X"; col = "#ec4899"; }
            else if (rtp < 85) { m = 0.5; res = "減注避險"; col = "#ef4444"; }

            document.getElementById('livePl').innerText = (e - cap).toFixed(0);
            updateStatus("下一手建議", `$ ${(bet * m).toFixed(1)}`, res, col);
            addHistory(`測速 #${++cycle}`, `${rtp.toFixed(1)}%`, res, col);

            document.getElementById('sBal').value = e;
            document.getElementById('eBal').value = '';
            setActiveInput('eBal');
        }

        function updateStatus(tag, main, sub, col) {
            document.getElementById('topTag').innerText = tag;
            document.getElementById('mainAction').innerText = main;
            document.getElementById('mainAction').style.color = col;
            document.getElementById('subText').innerText = sub;
            document.getElementById('subText').style.color = col;
        }

        function addHistory(type, data, res, col) {
            const list = document.getElementById('historyList');
            const row = document.createElement('div');
            row.className = 'p-3 bg-white/5 rounded-xl border-l-4 flex justify-between items-center text-[10px]';
            row.style.borderColor = col;
            row.innerHTML = `<div><span class="text-gray-500">${type}: ${data}</span><br><b style="color:${col}">${res}</b></div><div class="text-gray-600 font-mono">${new Date().toLocaleTimeString()}</div>`;
            list.prepend(row);
        }

        function resetAll() { if(confirm("確定重置數據？")) location.reload(); }
    </script>
</body>
</html>
