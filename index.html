<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>鋼鐵執行者 - 30日深度分析版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { touch-action: manipulation; -webkit-tap-highlight-color: transparent; -webkit-user-select: none; }
        body { background-color: #050505; color: white; overflow: hidden; height: 100vh; display: flex; flex-direction: column; padding-top: env(safe-area-inset-top); }
        .data-card { background: rgba(255, 255, 255, 0.04); border: 1px solid rgba(255, 255, 255, 0.1); transition: all 0.2s; }
        .active-box { border-color: #3b82f6 !important; background: rgba(59, 130, 246, 0.2); box-shadow: 0 0 12px rgba(59, 130, 246, 0.4); }
        input { pointer-events: none; }
        .tab-active { color: #3b82f6; border-bottom: 3px solid #3b82f6; font-weight: 900; }
        .hidden-page { display: none !important; }
        .history-row { padding: 12px; margin-bottom: 8px; border-radius: 12px; background: rgba(255, 255, 255, 0.06); border-left-width: 5px; }
        .input-label { text-align: center; font-size: 10px; color: #888; font-weight: 800; text-transform: uppercase; margin-bottom: 4px; }
    </style>
</head>
<body class="px-2 pb-2">

    <div class="max-w-md w-full h-full flex flex-col mx-auto space-y-2">
        
        <div class="bg-[#111] rounded-[1.5rem] border border-gray-800 overflow-hidden flex-shrink-0 mt-2">
            <div class="p-3 text-center border-b border-white/5 relative">
                <div class="absolute left-4 top-4">
                    <select id="volMode" class="bg-gray-800 text-[10px] font-bold p-1 rounded border border-gray-600 outline-none">
                        <option value="high">高波動 (賽特/雷神)</option>
                        <option value="med">中波動 (金寶/四川)</option>
                    </select>
                </div>
                <h1 id="mainAction" class="text-xl font-black italic tracking-tighter">PREDICTOR V4</h1>
                <div id="subText" class="text-[9px] text-blue-400 font-bold tracking-widest uppercase">Analyzing Cycle Data</div>
            </div>

            <div class="flex justify-around border-b border-white/5 bg-black/40 text-[11px] text-gray-400">
                <button onclick="switchPage('room')" id="tabRoom" class="flex-1 py-3 tab-active">大數據選房</button>
                <button onclick="switchPage('live')" id="tabLive" class="flex-1 py-3">測速與控注</button>
            </div>

            <div id="pageRoom" class="p-3 space-y-3">
                <div class="grid grid-cols-2 gap-2">
                    <div onclick="setActiveInput('dayBet')" id="boxDayBet" class="data-card p-2.5 rounded-xl text-center">
                        <p class="input-label text-blue-400">今日總下注</p>
                        <input type="number" id="dayBet" placeholder="0" class="bg-transparent text-lg font-black text-white w-full text-center outline-none">
                    </div>
                    <div onclick="setActiveInput('dayRtp')" id="boxDayRtp" class="data-card p-2.5 rounded-xl text-center">
                        <p class="input-label text-blue-400">今日得分率 %</p>
                        <input type="number" id="dayRtp" placeholder="0" class="bg-transparent text-lg font-black text-white w-full text-center outline-none">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-2 border-t border-white/5 pt-2">
                    <div onclick="setActiveInput('monthBet')" id="boxMonthBet" class="data-card p-2.5 rounded-xl text-center border-indigo-900/30">
                        <p class="input-label text-indigo-400">30日總下注</p>
                        <input type="number" id="monthBet" placeholder="0" class="bg-transparent text-lg font-black text-white w-full text-center outline-none">
                    </div>
                    <div onclick="setActiveInput('monthRtp')" id="boxMonthRtp" class="data-card p-2.5 rounded-xl text-center border-indigo-900/30">
                        <p class="input-label text-indigo-400">30日得分率 %</p>
                        <input type="number" id="monthRtp" placeholder="0" class="bg-transparent text-lg font-black text-white w-full text-center outline-none">
                    </div>
                </div>

                <div class="grid grid-cols-3 gap-2 border-t border-white/5 pt-2">
                    <div onclick="setActiveInput('curGap')" id="boxCurGap" class="data-card p-2 rounded-xl text-center">
                        <p class="input-label text-orange-400">當前未開</p>
                        <input type="number" id="curGap" placeholder="0" class="bg-transparent text-lg font-black text-orange-400 w-full text-center outline-none">
                    </div>
                    <div onclick="setActiveInput('pre1')" id="boxPre1" class="data-card p-2 rounded-xl text-center opacity-60">
                        <p class="input-label">前1未開</p>
                        <input type="number" id="pre1" placeholder="0" class="bg-transparent text-base font-bold text-gray-300 w-full text-center outline-none">
                    </div>
                    <div onclick="setActiveInput('targetRtp')" id="boxTargetRtp" class="data-card p-2 rounded-xl text-center opacity-60">
                        <p class="input-label">設定 RTP%</p>
                        <input type="number" id="targetRtp" value="96.8" class="bg-transparent text-base font-bold text-gray-300 w-full text-center outline-none">
                    </div>
                </div>
                
                <button onclick="runSkyCityAnalysis()" class="w-full py-4 bg-indigo-700 rounded-2xl font-black text-xs uppercase tracking-[0.3em] shadow-xl active:scale-95 transition">執行大週期綜合判斷</button>
            </div>

            <div id="pageLive" class="p-3 space-y-2 hidden-page">
                <div class="grid grid-cols-4 gap-1 text-[8px] font-bold">
                    <div onclick="setActiveInput('initCap')" id="boxInitCap" class="data-card p-1.5 rounded-lg text-center"><p class="text-gray-500">本金</p><input type="number" id="initCap" value="1000" class="bg-transparent text-white w-full text-center outline-none"></div>
                    <div onclick="setActiveInput('targetX')" id="boxTargetX" class="data-card p-1.5 rounded-lg text-center"><p class="text-green-400">止盈X</p><input type="number" id="targetX" value="2" class="bg-transparent text-green-400 w-full text-center outline-none"></div>
                    <div onclick="setActiveInput('baseBet')" id="boxBaseBet" class="data-card p-1.5 rounded-lg text-center"><p class="text-gray-500">基準</p><input type="number" id="baseBet" value="10" class="bg-transparent text-white w-full text-center outline-none"></div>
                    <div onclick="setActiveInput('spinT')" id="boxSpinT" class="data-card p-1.5 rounded-lg text-center"><p class="text-blue-400">測速轉</p><input type="number" id="spinT" value="50" class="bg-transparent text-blue-400 w-full text-center outline-none"></div>
                </div>
                <div class="grid grid-cols-2 gap-2 mt-1">
                    <div onclick="setActiveInput('sBal')" id="boxSBal" class="data-card p-4 rounded-2xl border border-blue-600 text-center"><p class="input-label">起始金額</p><input type="number" id="sBal" class="w-full bg-transparent text-2xl font-black text-center outline-none" placeholder="0"></div>
                    <div onclick="setActiveInput('eBal')" id="boxEBal" class="data-card p-4 rounded-2xl border border-transparent text-center"><p class="input-label">測速結束</p><input type="number" id="eBal" class="w-full bg-transparent text-2xl font-black text-center outline-none" placeholder="0"></div>
                </div>
                <button onclick="runLiveStrategy()" class="w-full py-4 bg-blue-600 rounded-2xl font-black text-xs tracking-widest active:scale-95 transition">計算下注建議</button>
            </div>

            <div class="p-3 pt-0 grid grid-cols-6 gap-1">
                <button onclick="pressKey('1')" class="py-3.5 bg-white/5 rounded-xl font-bold">1</button>
                <button onclick="pressKey('2')" class="py-3.5 bg-white/5 rounded-xl font-bold">2</button>
                <button onclick="pressKey('3')" class="py-3.5 bg-white/5 rounded-xl font-bold">3</button>
                <button onclick="pressKey('4')" class="py-3.5 bg-white/5 rounded-xl font-bold">4</button>
                <button onclick="pressKey('5')" class="py-3.5 bg-white/5 rounded-xl font-bold">5</button>
                <button onclick="pressKey('C')" class="py-3.5 bg-red-900/30 text-red-500 rounded-xl font-bold text-xs">CLR</button>
                <button onclick="pressKey('6')" class="py-3.5 bg-white/5 rounded-xl font-bold">6</button>
                <button onclick="pressKey('7')" class="py-3.5 bg-white/5 rounded-xl font-bold">7</button>
                <button onclick="pressKey('8')" class="py-3.5 bg-white/5 rounded-xl font-bold">8</button>
                <button onclick="pressKey('9')" class="py-3.5 bg-white/5 rounded-xl font-bold">9</button>
                <button onclick="pressKey('0')" class="py-3.5 bg-white/5 rounded-xl font-bold">0</button>
                <button onclick="resetAll()" class="py-3.5 bg-gray-800 rounded-xl font-bold text-[8px] text-gray-400">RESET</button>
            </div>
        </div>

        <div id="logSection" class="flex-grow flex flex-col min-h-0 bg-[#111] rounded-[1.5rem] border border-white/5 mb-4 overflow-hidden">
            <div id="roomStatsBar" class="p-2 border-b border-white/5 text-center"><span class="text-[9px] font-black text-gray-500 uppercase tracking-widest italic">Diagnostic Reports</span></div>
            <div id="battleStatsBar" class="p-4 border-b border-white/10 flex justify-between items-center hidden-page">
                <div><p class="text-[8px] text-gray-500 font-bold uppercase">Spins</p><span id="totalSpinsDisplay" class="text-xl font-black text-blue-400 leading-none">0</span></div>
                <div class="text-right"><p id="moodTag" class="text-[8px] text-blue-500 font-bold mb-1 tracking-tighter">STANDBY</p><span id="totalRtpDisplay" class="text-xl font-black text-green-400 leading-none">0.0%</span></div>
            </div>
            <div id="historyList" class="flex-grow overflow-y-auto p-4 space-y-2"></div>
        </div>
    </div>

    <script>
        let currentInputId = 'dayBet', isFirstKey = true, cycle = 0;
        let totalSpins = 0, totalBet = 0, totalReturn = 0;

        function switchPage(page) {
            document.getElementById('pageRoom').classList.toggle('hidden-page', page !== 'room');
            document.getElementById('pageLive').classList.toggle('hidden-page', page !== 'live');
            document.getElementById('tabRoom').classList.toggle('tab-active', page === 'room');
            document.getElementById('tabLive').classList.toggle('tab-active', page === 'live');
            document.getElementById('battleStatsBar').classList.toggle('hidden-page', page !== 'live');
            document.getElementById('roomStatsBar').classList.toggle('hidden-page', page !== 'room');
            setActiveInput(page === 'room' ? 'dayBet' : 'eBal');
        }

        function setActiveInput(id) {
            currentInputId = id; isFirstKey = true;
            document.querySelectorAll('.data-card').forEach(box => box.classList.remove('active-box'));
            const boxId = 'box' + id.charAt(0).toUpperCase() + id.slice(1);
            if(document.getElementById(boxId)) document.getElementById(boxId).classList.add('active-box');
        }

        function pressKey(key) {
            const input = document.getElementById(currentInputId);
            if (!input) return;
            if (key === 'C') { input.value = ''; isFirstKey = false; } 
            else { if (isFirstKey) { input.value = key; isFirstKey = false; } else { input.value += key; } }
        }

        function runSkyCityAnalysis() {
            const dbet = parseFloat(document.getElementById('dayBet').value) || 0;
            const mbet = parseFloat(document.getElementById('monthBet').value) || 1;
            const drtp = parseFloat(document.getElementById('dayRtp').value) || 0;
            const mrtp = parseFloat(document.getElementById('monthRtp').value) || 0;
            const trtp = parseFloat(document.getElementById('targetRtp').value) || 96.8;
            const curGap = parseInt(document.getElementById('curGap').value) || 0;
            const pre1 = parseInt(document.getElementById('pre1').value) || 1;

            const dayHouseMoney = dbet * (1 - (drtp/100)); // 今日機台淨賺
            const monthBalance = mrtp - trtp; // 30日得分率與設定值的差距
            const gapTrend = curGap / pre1;

            let advice = "", col = "#3b82f6";

            // --- 深度決策邏輯 ---
            if (mrtp > 0 && monthBalance < -5 && drtp < trtp) {
                // 30日得分率比設定低 5% 以上，且今天也在咬錢
                advice = "超級紅池預警：大週期嚴重虧欠，隨時噴發"; col = "#ef4444";
            } else if (dayHouseMoney > 0 && gapTrend < 1) {
                advice = "穩定吃錢中：今日盈餘飽滿，節奏緊湊可進"; col = "#fbbf24";
            } else if (monthBalance > 3) {
                advice = "週期過熱：本月吐分已超標，機器可能強抽水"; col = "#94a3b8";
            } else if (drtp > 120) {
                advice = "今日已吐分：機台處於虧損狀態，不建議埋伏"; col = "#10b981";
            } else {
                advice = "狀態平穩：適合小額測速觀察"; col = "#3b82f6";
            }

            updateStatus("深度分析", advice, col);
            addHistory("週期診斷", `月偏離: ${monthBalance.toFixed(1)}% | 今日淨賺: $${Math.floor(dayHouseMoney)}`, advice, col);
        }

        function runLiveStrategy() {
            const mode = document.getElementById('volMode').value;
            const bet = parseFloat(document.getElementById('baseBet').value);
            const s = parseFloat(document.getElementById('sBal').value);
            const e = parseFloat(document.getElementById('eBal').value);
            const t = parseFloat(document.getElementById('spinT').value);
            if (isNaN(e) || isNaN(s)) return;

            const roundBet = bet * t;
            const roundRet = e - s + roundBet;
            const rtp = (roundRet / roundBet) * 100;

            totalSpins += t; totalBet += roundBet; totalReturn += roundRet;
            
            let m = 1.0, res = "平打測速", col = "#3b82f6";
            if (mode === 'high') {
                if (rtp >= 130) { m = 4.0; res = "強烈追擊 4.0X"; col = "#f87171"; }
                else if (rtp < 70) { m = 0.1; res = "極限防守 0.1X"; col = "#991b1b"; }
            } else {
                if (rtp >= 150) { m = 2.5; res = "加碼進攻 2.5X"; col = "#a855f7"; }
                else if (rtp < 80) { m = 0.5; res = "減注觀察 0.5X"; col = "#ef4444"; }
            }

            updateStatus("注碼建議", `$ ${(bet * m).toFixed(1)}`, col);
            addHistory(`測速 #${++cycle}`, `得分率: ${rtp.toFixed(1)}%`, res, col);
            
            document.getElementById('sBal').value = e;
            document.getElementById('eBal').value = '';
            setActiveInput('eBal');
            updateBattleDisplay();
        }

        function updateBattleDisplay() {
            document.getElementById('totalSpinsDisplay').innerText = totalSpins;
            const gRtp = (totalReturn / totalBet) * 100;
            document.getElementById('totalRtpDisplay').innerText = gRtp.toFixed(1) + "%";
            document.getElementById('moodTag').innerText = gRtp > 100 ? "PROFIT ZONE" : "ANALYZING";
        }

        function updateStatus(main, sub, col) {
            document.getElementById('mainAction').innerText = main;
            document.getElementById('subText').innerText = sub;
            document.getElementById('subText').style.color = col;
        }

        function addHistory(type, data, res, col) {
            const list = document.getElementById('historyList');
            const row = document.createElement('div');
            row.className = 'history-row'; row.style.borderColor = col;
            row.innerHTML = `<div><div class="text-[8px] text-gray-500 font-bold uppercase">${type}</div><div class="text-[16px] font-black" style="color:${col}">${res}</div><div class="text-[10px] text-gray-400 mt-1">${data}</div></div>`;
            list.prepend(row);
        }

        function resetAll() { if(confirm("確定清除數據重新開始？")) location.reload(); }
    </script>
</body>
</html>
