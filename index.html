<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>鋼鐵執行者 - 終極戰情防護版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { touch-action: manipulation; -webkit-tap-highlight-color: transparent; -webkit-user-select: none; }
        body { background-color: #050505; color: white; overflow: hidden; height: 100vh; display: flex; flex-direction: column; transition: all 0.4s ease; }
        .data-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); }
        .active-box { border-color: #3b82f6 !important; background: rgba(59, 130, 246, 0.15); box-shadow: 0 0 10px rgba(59, 130, 246, 0.2); }
        input { pointer-events: none; }
        .tab-active { color: #3b82f6; border-bottom: 2px solid #3b82f6; font-weight: 900; }
        .hidden-page { display: none; }
        /* 波動燈動畫 */
        .volt-flash { animation: pulse 0.8s infinite; }
        @keyframes pulse { 0% { opacity: 1; box-shadow: 0 0 15px currentColor; } 50% { opacity: 0.3; } 100% { opacity: 1; box-shadow: 0 0 15px currentColor; } }
        /* 防上頭背景色 */
        .tilt-mode { background-color: #450a0a !important; }
        .win-mode { background-color: #064e3b !important; }
    </style>
</head>
<body class="p-3 font-sans">

    <div class="max-w-md w-full h-full flex flex-col mx-auto space-y-3">
        
        <div class="flex justify-around bg-[#111] rounded-xl border border-white/5 flex-shrink-0">
            <button onclick="switchPage('room')" id="tabRoom" class="flex-1 py-3 text-[11px] text-gray-500 tab-active uppercase">數據診斷</button>
            <button onclick="switchPage('live')" id="tabLive" class="flex-1 py-3 text-[11px] text-gray-500 uppercase">測速策略</button>
        </div>

        <div class="bg-[#111] rounded-[2rem] border border-gray-800 overflow-hidden flex-shrink-0 shadow-2xl">
            <div id="statusHeader" class="p-4 text-center bg-gray-900/50 border-b border-white/5 relative">
                <div class="absolute top-4 right-6 flex flex-col items-center">
                    <div id="voltLight" class="w-3 h-3 rounded-full bg-gray-600 mb-1"></div>
                    <span id="voltText" class="text-[8px] font-bold text-gray-500 uppercase">VOLT</span>
                </div>

                <div id="topTag" class="text-[9px] font-black tracking-widest text-gray-500 uppercase">System Ready</div>
                <h1 id="mainAction" class="text-xl font-black my-1 text-white">請輸入數據</h1>
                <div id="subText" class="text-[10px] text-blue-400 font-bold uppercase tracking-widest">Waiting for input...</div>
            </div>

            <div id="pageRoom" class="p-4 space-y-3">
                <div class="grid grid-cols-2 gap-2">
                    <div onclick="setActiveInput('dayRtp')" id="boxDayRtp" class="data-card p-2 rounded-xl text-center cursor-pointer">
                        <p class="text-[8px] text-gray-500 font-bold uppercase">當日 RTP (%)</p>
                        <input type="number" id="dayRtp" placeholder="0" class="bg-transparent text-sm font-bold text-white w-full text-center outline-none">
                    </div>
                    <div onclick="setActiveInput('dayBet')" id="boxDayBet" class="data-card p-2 rounded-xl text-center cursor-pointer">
                        <p class="text-[8px] text-gray-500 font-bold uppercase">當日投注 (萬)</p>
                        <input type="number" id="dayBet" placeholder="0" class="bg-transparent text-sm font-bold text-white w-full text-center outline-none">
                    </div>
                    <div onclick="setActiveInput('monthRtp')" id="boxMonthRtp" class="data-card p-2 rounded-xl text-center cursor-pointer">
                        <p class="text-[8px] text-gray-400 font-bold uppercase">30日 RTP (%)</p>
                        <input type="number" id="monthRtp" placeholder="0" class="bg-transparent text-sm font-bold text-gray-400 w-full text-center outline-none">
                    </div>
                    <div onclick="setActiveInput('monthBet')" id="boxMonthBet" class="data-card p-2 rounded-xl text-center cursor-pointer">
                        <p class="text-[8px] text-gray-400 font-bold uppercase">30日投注 (萬)</p>
                        <input type="number" id="monthBet" placeholder="0" class="bg-transparent text-sm font-bold text-gray-400 w-full text-center outline-none">
                    </div>
                </div>
                <button onclick="runDeepAnalysis()" class="w-full py-3 bg-indigo-600 rounded-xl font-black text-white shadow-lg active:scale-95 transition-transform">進行波動深度診斷</button>
            </div>

            <div id="pageLive" class="p-4 space-y-3 hidden-page">
                <div class="grid grid-cols-2 gap-2 bg-white/5 p-2 rounded-xl border border-white/5 mb-1">
                    <div class="text-center">
                        <p class="text-[8px] text-gray-400 font-bold uppercase tracking-widest">當前總轉數</p>
                        <div id="totalSpinsDisplay" class="text-lg font-black text-blue-400">0</div>
                    </div>
                    <div class="text-center">
                        <p class="text-[8px] text-gray-400 font-bold uppercase tracking-widest">當前整體 RTP</p>
                        <div id="totalRtpDisplay" class="text-lg font-black text-green-400">0%</div>
                    </div>
                </div>

                <div class="grid grid-cols-4 gap-2">
                    <div onclick="setActiveInput('initCap')" id="boxInitCap" class="data-card p-2 rounded-lg text-center cursor-pointer">
                        <p class="text-[7px] text-gray-500 font-bold">本金</p>
                        <input type="number" id="initCap" value="1000" class="bg-transparent text-[10px] font-bold text-white w-full text-center outline-none">
                    </div>
                    <div onclick="setActiveInput('winGoal')" id="boxWinGoal" class="data-card p-2 rounded-lg text-center cursor-pointer border-orange-500/30">
                        <p class="text-[7px] text-orange-400 font-bold">止盈目標</p>
                        <input type="number" id="winGoal" value="2000" class="bg-transparent text-[10px] font-bold text-orange-400 w-full text-center outline-none">
                    </div>
                    <div onclick="setActiveInput('baseBet')" id="boxBaseBet" class="data-card p-2 rounded-lg text-center cursor-pointer">
                        <p class="text-[7px] text-gray-500 font-bold">基準注</p>
                        <input type="number" id="baseBet" value="10" class="bg-transparent text-[10px] font-bold text-white w-full text-center outline-none">
                    </div>
                    <div onclick="setActiveInput('spinT')" id="boxSpinT" class="data-card p-2 rounded-lg text-center cursor-pointer">
                        <p class="text-[7px] text-blue-400 font-bold">轉數</p>
                        <input type="number" id="spinT" value="50" class="bg-transparent text-[10px] font-bold text-blue-400 w-full text-center outline-none">
                    </div>
                </div>
                
                <div class="grid grid-cols-2 gap-3">
                    <div onclick="setActiveInput('sBal')" id="boxSBal" class="data-card p-3 rounded-2xl border-2 border-blue-600 text-center cursor-pointer">
                        <p class="text-[9px] text-gray-500 font-bold uppercase">前餘額</p>
                        <input type="number" id="sBal" class="w-full bg-transparent text-xl font-black text-center outline-none" placeholder="0">
                    </div>
                    <div onclick="setActiveInput('eBal')" id="boxEBal" class="data-card p-3 rounded-2xl border-2 border-transparent text-center cursor-pointer">
                        <p class="text-[9px] text-gray-500 font-bold uppercase">後餘額</p>
                        <input type="number" id="eBal" class="w-full bg-transparent text-xl font-black text-center outline-none" placeholder="0">
                    </div>
                </div>
                <button onclick="runLiveStrategy()" class="w-full py-3 bg-blue-600 rounded-xl font-black text-white shadow-lg active:scale-95 transition-transform">執行測速並計算注碼</button>
            </div>

            <div class="p-4 pt-0 grid grid-cols-3 gap-1.5 flex-shrink-0">
                <button onclick="pressKey('1')" class="py-3 bg-white/5 rounded-xl font-bold active:bg-white/10">1</button>
                <button onclick="pressKey('2')" class="py-3 bg-white/5 rounded-xl font-bold active:bg-white/10">2</button>
                <button onclick="pressKey('3')" class="py-3 bg-white/5 rounded-xl font-bold active:bg-white/10">3</button>
                <button onclick="pressKey('4')" class="py-3 bg-white/5 rounded-xl font-bold active:bg-white/10">4</button>
                <button onclick="pressKey('5')" class="py-3 bg-white/5 rounded-xl font-bold active:bg-white/10">5</button>
                <button onclick="pressKey('6')" class="py-3 bg-white/5 rounded-xl font-bold active:bg-white/10">6</button>
                <button onclick="pressKey('7')" class="py-3 bg-white/5 rounded-xl font-bold active:bg-white/10">7</button>
                <button onclick="pressKey('8')" class="py-3 bg-white/5 rounded-xl font-bold active:bg-white/10">8</button>
                <button onclick="pressKey('9')" class="py-3 bg-white/5 rounded-xl font-bold active:bg-white/10">9</button>
                <button onclick="pressKey('C')" class="py-3 bg-red-900/10 text-red-500 rounded-xl font-bold">C</button>
                <button onclick="pressKey('0')" class="py-3 bg-white/5 rounded-xl font-bold active:bg-white/10">0</button>
                <button onclick="resetAll()" class="py-3 bg-gray-800 rounded-xl font-bold text-[10px]">重置數據</button>
            </div>
        </div>

        <div id="historyList" class="flex-grow bg-[#111] rounded-2xl border border-white/5 overflow-y-auto p-2 space-y-2"></div>
    </div>

    <script>
        let currentInputId = 'dayRtp';
        let cycle = 0;
        let lastLiveRtp = null;
        let lossStreak = 0;

        // 全局戰情追蹤
        let totalSpins = 0;
        let totalBetAmount = 0;
        let totalReturnAmount = 0;

        function switchPage(page) {
            document.getElementById('pageRoom').classList.toggle('hidden-page', page !== 'room');
            document.getElementById('pageLive').classList.toggle('hidden-page', page !== 'live');
            document.getElementById('tabRoom').classList.toggle('tab-active', page === 'room');
            document.getElementById('tabLive').classList.toggle('tab-active', page === 'live');
            setActiveInput(page === 'room' ? 'dayRtp' : 'sBal');
        }

        function setActiveInput(id) {
            currentInputId = id;
            document.querySelectorAll('.data-card').forEach(box => box.classList.remove('active-box'));
            const boxId = 'box' + id.charAt(0).toUpperCase() + id.slice(1);
            if(document.getElementById(boxId)) document.getElementById(boxId).classList.add('active-box');
        }

        function pressKey(key) {
            const input = document.getElementById(currentInputId);
            if (!input) return;
            if (key === 'C') input.value = ''; else input.value += key;
        }

        function updateVoltDisplay(diff) {
            const vLight = document.getElementById('voltLight');
            const vText = document.getElementById('voltText');
            let color = "#22c55e"; let status = "穩定"; let flash = false;

            if (Math.abs(diff) > 40) { color = "#ef4444"; status = "狂暴"; flash = true; }
            else if (Math.abs(diff) > 15) { color = "#f59e0b"; status = "升溫"; flash = false; }

            vLight.style.backgroundColor = color;
            vLight.style.boxShadow = `0 0 10px ${color}`;
            vLight.classList.toggle('volt-flash', flash);
            vText.innerText = status;
            vText.style.color = color;
        }

        function runDeepAnalysis() {
            const dR = parseFloat(document.getElementById('dayRtp').value) || 0;
            const mR = parseFloat(document.getElementById('monthRtp').value) || 0;
            const dBet = parseFloat(document.getElementById('dayBet').value) || 0;
            const mBet = parseFloat(document.getElementById('monthBet').value) || 0;
            if (!dR || !mR) return;

            const diff = dR - mR;
            updateVoltDisplay(diff);

            let res = "數據平穩"; let adv = "適合慢磨策略"; let col = "#22c55e";
            if (diff > 5 && mR < 97) { res = "起漲訊號 🚀"; adv = "符合蓄水突破，建議進場"; col = "#a855f7"; }
            else if (dR < 88) { res = "避開陷阱 ⛔"; adv = "目前強抽水，不宜進場"; col = "#ef4444"; }

            updateStatus("深度分析結果", res, adv, col);
            addHistory("診斷", `差值:${diff.toFixed(1)}%`, res, col);
        }

        function runLiveStrategy() {
            const init = parseFloat(document.getElementById('initCap').value);
            const goal = parseFloat(document.getElementById('winGoal').value);
            const bet = parseFloat(document.getElementById('baseBet').value);
            const s = parseFloat(document.getElementById('sBal').value);
            const e = parseFloat(document.getElementById('eBal').value);
            const t = parseFloat(document.getElementById('spinT').value);
            if (!s || !e) return;

            // 計算單回合 RTP
            const roundBet = bet * t;
            const roundReturn = e - s + roundBet;
            const rtp = (roundReturn / roundBet) * 100;

            // 更新全局戰情
            totalSpins += t;
            totalBetAmount += roundBet;
            totalReturnAmount += roundReturn;
            const globalRtp = (totalReturnAmount / totalBetAmount) * 100;

            // 更新 UI 看板
            document.getElementById('totalSpinsDisplay').innerText = totalSpins;
            document.getElementById('totalRtpDisplay').innerText = globalRtp.toFixed(1) + "%";
            document.getElementById('totalRtpDisplay').style.color = globalRtp >= 100 ? "#4ade80" : "#fb7185";

            // 防上頭：止損檢測 (50%)
            if (e <= (init * 0.5)) {
                document.body.classList.add('tilt-mode');
                updateStatus("觸發止損保護", "請離場休息", "虧損達 50% 強制煞車", "#fff");
                return;
            }
            // 防上頭：止盈檢測
            if (e >= goal) {
                document.body.classList.add('win-mode');
                updateStatus("目標達成 ✨", "建議獲利入袋", `已達目標: $${goal}`, "#fff");
            }

            // 即時波動燈感應
            if (lastLiveRtp !== null) updateVoltDisplay(rtp - lastLiveRtp);

            let m = 1.0; let res = "平打觀察"; let col = "#3b82f6";
            if (rtp >= 160) { m = 3.0; res = "倍數 3X"; col = "#a855f7"; lossStreak = 0; }
            else if (rtp >= 120) { m = 2.0; res = "強力 2X"; col = "#ec4899"; lossStreak = 0; }
            else if (rtp < 80) { m = 0.2; res = "避險 0.2X"; col = "#ef4444"; lossStreak++; }

            // 連輸強制冷靜
            if (lossStreak >= 3) {
                updateStatus("連輸預警", "建議停機 5 分鐘", "機台強抽水中", "#f87171");
            } else {
                updateStatus("下一手建議", `$ ${(bet * m).toFixed(1)}`, res, col);
            }

            addHistory(`測速 #${++cycle}`, `RTP:${rtp.toFixed(1)}%`, res, col);
            lastLiveRtp = rtp;
            document.getElementById('sBal').value = e;
            document.getElementById('eBal').value = '';
            setActiveInput('eBal');
        }

        function updateStatus(tag, main, sub, col) {
            document.getElementById('topTag').innerText = tag;
            const m = document.getElementById('mainAction');
            m.innerText = main; m.style.color = col;
            const s = document.getElementById('subText');
            s.innerText = sub; s.style.color = col;
        }

        function addHistory(type, data, res, col) {
            const list = document.getElementById('historyList');
            const row = document.createElement('div');
            row.className = 'p-3 bg-white/5 rounded-xl border-l-4 flex justify-between items-center text-[10px] animate-in slide-in-from-left duration-300';
            row.style.borderColor = col;
            row.innerHTML = `<div><span class="text-gray-500">${type}: ${data}</span><br><b style="color:${col}">${res}</b></div><div class="text-gray-600 font-mono">${new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</div>`;
            list.prepend(row);
        }

        function resetAll() { 
            if(confirm("確定重置所有戰情與數據？")) {
                document.body.classList.remove('tilt-mode', 'win-mode');
                location.reload(); 
            }
        }
    </script>
</body>
</html>
