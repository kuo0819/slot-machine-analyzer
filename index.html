<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>鋼鐵執行者 - 大字戰情版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { touch-action: manipulation; -webkit-tap-highlight-color: transparent; -webkit-user-select: none; }
        body { background-color: #050505; color: white; overflow: hidden; height: 100vh; display: flex; flex-direction: column; transition: all 0.4s ease; }
        .data-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); }
        .active-box { border-color: #3b82f6 !important; background: rgba(59, 130, 246, 0.15); box-shadow: 0 0 10px rgba(59, 130, 246, 0.2); }
        input { pointer-events: none; }
        .tab-active { color: #3b82f6; border-bottom: 2px solid #3b82f6; font-weight: 900; }
        .hidden-page { display: none; }
        .volt-flash { animation: pulse 0.8s infinite; }
        @keyframes pulse { 0% { opacity: 1; box-shadow: 0 0 15px currentColor; } 50% { opacity: 0.3; } 100% { opacity: 1; box-shadow: 0 0 15px currentColor; } }
        .tilt-mode { background-color: #450a0a !important; }
        .win-mode { background-color: #064e3b !important; }
        
        /* 針對歷史紀錄的大字體優化 */
        .history-row { padding: 1rem; margin-bottom: 0.75rem; border-radius: 1rem; background: rgba(255, 255, 255, 0.05); }
        .history-type { font-size: 14px; color: #9ca3af; font-weight: 700; margin-bottom: 2px; }
        .history-val { font-size: 18px; font-weight: 900; }
        .history-time { font-size: 12px; color: #4b5563; font-family: monospace; }
    </style>
</head>
<body class="p-3 font-sans">

    <div class="max-w-md w-full h-full flex flex-col mx-auto space-y-3">
        
        <div class="flex justify-around bg-[#111] rounded-xl border border-white/5 flex-shrink-0">
            <button onclick="switchPage('room')" id="tabRoom" class="flex-1 py-3 text-[12px] text-gray-500 tab-active uppercase">數據診斷</button>
            <button onclick="switchPage('live')" id="tabLive" class="flex-1 py-3 text-[12px] text-gray-500 uppercase">測速策略</button>
        </div>

        <div class="bg-[#111] rounded-[2rem] border border-gray-800 overflow-hidden flex-shrink-0">
            <div id="statusHeader" class="p-4 text-center bg-gray-900/50 border-b border-white/5 relative">
                <div class="absolute top-4 right-6 flex flex-col items-center">
                    <div id="voltLight" class="w-3 h-3 rounded-full bg-gray-600 mb-1"></div>
                    <span id="voltText" class="text-[8px] font-bold text-gray-500 uppercase">VOLT</span>
                </div>
                <div id="topTag" class="text-[9px] font-black tracking-widest text-gray-500 uppercase">Battle Dashboard</div>
                <h1 id="mainAction" class="text-2xl font-black my-1 text-white tracking-tight">等待數據</h1>
                <div id="subText" class="text-[11px] text-blue-400 font-bold uppercase tracking-widest">Ready</div>
            </div>

            <div id="pageRoom" class="p-4 space-y-3">
                <div class="grid grid-cols-2 gap-2">
                    <div onclick="setActiveInput('dayRtp')" id="boxDayRtp" class="data-card p-2 rounded-xl text-center"><p class="text-[9px] text-gray-500 font-bold">當日 RTP</p><input type="number" id="dayRtp" placeholder="0" class="bg-transparent text-lg font-bold text-white w-full text-center outline-none"></div>
                    <div onclick="setActiveInput('dayBet')" id="boxDayBet" class="data-card p-2 rounded-xl text-center"><p class="text-[9px] text-gray-500 font-bold">當日總投</p><input type="number" id="dayBet" placeholder="0" class="bg-transparent text-lg font-bold text-white w-full text-center outline-none"></div>
                    <div onclick="setActiveInput('monthRtp')" id="boxMonthRtp" class="data-card p-2 rounded-xl text-center"><p class="text-[9px] text-gray-400 font-bold">30日 RTP</p><input type="number" id="monthRtp" placeholder="0" class="bg-transparent text-lg font-bold text-gray-400 w-full text-center outline-none"></div>
                    <div onclick="setActiveInput('monthBet')" id="boxMonthBet" class="data-card p-2 rounded-xl text-center"><p class="text-[9px] text-gray-400 font-bold">30日總投</p><input type="number" id="monthBet" placeholder="0" class="bg-transparent text-lg font-bold text-gray-400 w-full text-center outline-none"></div>
                </div>
                <button onclick="runDeepAnalysis()" class="w-full py-3 bg-indigo-600 rounded-xl font-black text-white text-lg">啟動診斷</button>
            </div>

            <div id="pageLive" class="p-4 space-y-3 hidden-page">
                <div class="grid grid-cols-2 gap-2 bg-white/5 p-3 rounded-xl border border-white/5">
                    <div class="text-center">
                        <p class="text-[9px] text-gray-400 font-bold uppercase">累計總轉數</p>
                        <div id="totalSpinsDisplay" class="text-xl font-black text-blue-400">0</div>
                    </div>
                    <div class="text-center">
                        <p class="text-[9px] text-gray-400 font-bold uppercase">整體總 RTP</p>
                        <div id="totalRtpDisplay" class="text-xl font-black text-green-400">0%</div>
                    </div>
                </div>

                <div class="grid grid-cols-4 gap-1.5">
                    <div onclick="setActiveInput('initCap')" id="boxInitCap" class="data-card p-2 rounded-lg text-center"><p class="text-[8px] text-gray-500 font-bold">本金</p><input type="number" id="initCap" value="1000" class="bg-transparent text-xs font-bold text-white w-full text-center outline-none"></div>
                    <div onclick="setActiveInput('targetX')" id="boxTargetX" class="data-card p-2 rounded-lg text-center border-green-500/50"><p class="text-[8px] text-green-400 font-bold">止盈X</p><input type="number" id="targetX" value="2" class="bg-transparent text-xs font-bold text-green-400 w-full text-center outline-none"></div>
                    <div onclick="setActiveInput('baseBet')" id="boxBaseBet" class="data-card p-2 rounded-lg text-center"><p class="text-[8px] text-gray-500 font-bold">基準</p><input type="number" id="baseBet" value="10" class="bg-transparent text-xs font-bold text-white w-full text-center outline-none"></div>
                    <div onclick="setActiveInput('spinT')" id="boxSpinT" class="data-card p-2 rounded-lg text-center"><p class="text-[8px] text-blue-400 font-bold">轉數</p><input type="number" id="spinT" value="50" class="bg-transparent text-xs font-bold text-blue-400 w-full text-center outline-none"></div>
                </div>
                
                <div class="grid grid-cols-2 gap-3">
                    <div onclick="setActiveInput('sBal')" id="boxSBal" class="data-card p-4 rounded-2xl border-2 border-blue-600 text-center"><p class="text-[10px] text-gray-500 font-bold uppercase">前餘額</p><input type="number" id="sBal" class="w-full bg-transparent text-2xl font-black text-center outline-none"></div>
                    <div onclick="setActiveInput('eBal')" id="boxEBal" class="data-card p-4 rounded-2xl border-2 border-transparent text-center"><p class="text-[10px] text-gray-500 font-bold uppercase">後餘額</p><input type="number" id="eBal" class="w-full bg-transparent text-2xl font-black text-center outline-none"></div>
                </div>
                <button onclick="runLiveStrategy()" class="w-full py-4 bg-blue-600 rounded-xl font-black text-white text-lg shadow-lg">計算策略建議</button>
            </div>

            <div class="p-4 pt-0 grid grid-cols-3 gap-1.5 flex-shrink-0">
                <button onclick="pressKey('1')" class="py-4 bg-white/5 rounded-xl text-xl font-bold">1</button>
                <button onclick="pressKey('2')" class="py-4 bg-white/5 rounded-xl text-xl font-bold">2</button>
                <button onclick="pressKey('3')" class="py-4 bg-white/5 rounded-xl text-xl font-bold">3</button>
                <button onclick="pressKey('4')" class="py-4 bg-white/5 rounded-xl text-xl font-bold">4</button>
                <button onclick="pressKey('5')" class="py-4 bg-white/5 rounded-xl text-xl font-bold">5</button>
                <button onclick="pressKey('6')" class="py-4 bg-white/5 rounded-xl text-xl font-bold">6</button>
                <button onclick="pressKey('7')" class="py-4 bg-white/5 rounded-xl text-xl font-bold">7</button>
                <button onclick="pressKey('8')" class="py-4 bg-white/5 rounded-xl text-xl font-bold">8</button>
                <button onclick="pressKey('9')" class="py-4 bg-white/5 rounded-xl text-xl font-bold">9</button>
                <button onclick="pressKey('C')" class="py-4 bg-red-900/10 text-red-500 rounded-xl text-xl font-bold">C</button>
                <button onclick="pressKey('0')" class="py-4 bg-white/5 rounded-xl text-xl font-bold">0</button>
                <button onclick="resetAll()" class="py-4 bg-gray-800 rounded-xl font-bold text-xs">重置</button>
            </div>
        </div>

        <div id="historyList" class="flex-grow bg-[#111] rounded-2xl border border-white/5 overflow-y-auto p-4"></div>
    </div>

    <script>
        let currentInputId = 'dayRtp';
        let isFirstKey = true;
        let cycle = 0, lastLiveRtp = null, lossStreak = 0;
        let totalSpins = 0, totalBetAmount = 0, totalReturnAmount = 0;

        window.onload = () => {
            const saved = localStorage.getItem('steel_executor_data');
            if (saved) {
                const data = JSON.parse(saved);
                totalSpins = data.spins || 0;
                totalBetAmount = data.bet || 0;
                totalReturnAmount = data.ret || 0;
                updateBattleDisplay();
            }
        };

        function switchPage(page) {
            document.getElementById('pageRoom').classList.toggle('hidden-page', page !== 'room');
            document.getElementById('pageLive').classList.toggle('hidden-page', page !== 'live');
            document.getElementById('tabRoom').classList.toggle('tab-active', page === 'room');
            document.getElementById('tabLive').classList.toggle('tab-active', page === 'live');
            setActiveInput(page === 'room' ? 'dayRtp' : 'sBal');
        }

        function setActiveInput(id) {
            currentInputId = id;
            isFirstKey = true;
            document.querySelectorAll('.data-card').forEach(box => box.classList.remove('active-box'));
            const boxId = 'box' + id.charAt(0).toUpperCase() + id.slice(1);
            if(document.getElementById(boxId)) document.getElementById(boxId).classList.add('active-box');
        }

        function pressKey(key) {
            const input = document.getElementById(currentInputId);
            if (!input) return;
            if (key === 'C') { input.value = ''; isFirstKey = false; } 
            else {
                if (isFirstKey) { input.value = key; isFirstKey = false; } 
                else { input.value += key; }
            }
        }

        function updateBattleDisplay() {
            document.getElementById('totalSpinsDisplay').innerText = totalSpins;
            const globalRtp = totalBetAmount > 0 ? (totalReturnAmount / totalBetAmount) * 100 : 0;
            const rtpDisp = document.getElementById('totalRtpDisplay');
            rtpDisp.innerText = globalRtp.toFixed(1) + "%";
            rtpDisp.style.color = globalRtp >= 100 ? "#4ade80" : "#fb7185";
            localStorage.setItem('steel_executor_data', JSON.stringify({
                spins: totalSpins, bet: totalBetAmount, ret: totalReturnAmount
            }));
        }

        function updateVoltDisplay(diff) {
            const vLight = document.getElementById('voltLight');
            const vText = document.getElementById('voltText');
            let color = "#22c55e", status = "穩定";
            if (Math.abs(diff) > 40) { color = "#ef4444"; status = "狂暴"; }
            else if (Math.abs(diff) > 15) { color = "#f59e0b"; status = "升溫"; }
            vLight.style.backgroundColor = color;
            vLight.style.boxShadow = `0 0 10px ${color}`;
            vText.innerText = status; vText.style.color = color;
        }

        function runDeepAnalysis() {
            const dR = parseFloat(document.getElementById('dayRtp').value) || 0;
            const mR = parseFloat(document.getElementById('monthRtp').value) || 0;
            if (!dR || !mR) return;
            const diff = dR - mR;
            updateVoltDisplay(diff);
            let res = "數據平穩", adv = "建議慢磨策略", col = "#22c55e";
            if (diff > 5 && mR < 97) { res = "起漲訊號 🚀", adv = "符合蓄水突破", col = "#a855f7"; }
            else if (dR < 88) { res = "避開陷阱 ⛔", adv = "目前強抽建議換房", col = "#ef4444"; }
            updateStatus("深度分析", res, adv, col);
            addHistory("房間診斷", `差值: ${diff.toFixed(1)}%`, res, col);
        }

        function runLiveStrategy() {
            const init = parseFloat(document.getElementById('initCap').value);
            const targetX = parseFloat(document.getElementById('targetX').value);
            const bet = parseFloat(document.getElementById('baseBet').value);
            const s = parseFloat(document.getElementById('sBal').value);
            const e = parseFloat(document.getElementById('eBal').value);
            const t = parseFloat(document.getElementById('spinT').value);
            if (isNaN(e)) return;

            const roundBet = bet * t;
            const roundReturn = e - s + roundBet;
            const rtp = (roundReturn / roundBet) * 100;

            if (rtp > 1500 || rtp < -200) {
                if(!confirm("數據似乎異常(RTP超常)，確定要紀錄？")) return;
            }

            totalSpins += t;
            totalBetAmount += roundBet;
            totalReturnAmount += roundReturn;
            updateBattleDisplay();

            if (e >= (init * targetX)) {
                document.body.classList.add('win-mode');
                updateStatus(`目標達成 (${targetX}X)`, "立即收手", `已達 $${e.toFixed(0)}`, "#fff");
                addHistory("止盈鎖定", `達成 ${targetX}倍`, "獲利入袋", "#4ade80");
                return;
            }
            if (e <= (init * 0.5)) {
                document.body.classList.add('tilt-mode');
                updateStatus("觸發止損", "停止操作", "虧損達 50%", "#fff");
                return;
            }

            let m = 1.0, res = "平打觀察", col = "#3b82f6";
            if (rtp >= 160) { m = 3.0; res = "倍數 3X"; col = "#a855f7"; lossStreak = 0; }
            else if (rtp >= 120) { m = 2.0; res = "強力 2X"; col = "#ec4899"; lossStreak = 0; }
            else if (rtp < 80) { m = 0.2; res = "避險 0.2X"; col = "#ef4444"; lossStreak++; }

            if (lossStreak >= 3) {
                updateStatus("連輸預警", "建議冷靜", "機台強抽中", "#f87171");
            } else {
                updateStatus("建議注碼", `$ ${(bet * m).toFixed(1)}`, res, col);
            }

            addHistory(`測速 #${++cycle}`, `RTP: ${rtp.toFixed(1)}%`, res, col);
            lastLiveRtp = rtp;
            document.getElementById('sBal').value = e;
            document.getElementById('eBal').value = '';
            setActiveInput('eBal');
        }

        function updateStatus(tag, main, sub, col) {
            document.getElementById('topTag').innerText = tag;
            const m = document.getElementById('mainAction');
            m.innerText = main; m.style.color = col;
            const s = document.getElementById('subText');
            s.innerText = sub; s.style.color = col;
        }

        function addHistory(type, data, res, col) {
            const list = document.getElementById('historyList');
            const row = document.createElement('div');
            row.className = 'history-row border-l-8';
            row.style.borderColor = col;
            row.innerHTML = `
                <div class="flex justify-between items-start">
                    <div>
                        <div class="history-type">${type}</div>
                        <div class="history-val" style="color:${col}">${res}</div>
                        <div class="text-[14px] text-gray-400 mt-1 font-bold">${data}</div>
                    </div>
                    <div class="history-time">${new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', second:'2-digit'})}</div>
                </div>
            `;
            list.prepend(row);
        }

        function resetAll() { if(confirm("確定重置數據？")) { localStorage.removeItem('steel_executor_data'); location.reload(); } }
    </script>
</body>
</html>
