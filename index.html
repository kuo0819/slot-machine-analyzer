<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>鋼鐵執行者 - 專業防縮放策略版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 移除瀏覽器預設縮放與延遲 */
        * {
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            user-select: none;
        }

        input {
            user-select: auto !important;
            -webkit-user-select: auto !important;
        }

        input::-webkit-outer-spin-button, 
        input::-webkit-inner-spin-button { -webkit-appearance: none; }

        body { 
            background-color: #050505; 
            color: white; 
            overflow: hidden; 
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .data-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); }
        .active-box { border-color: #3b82f6 !important; background: rgba(59, 130, 246, 0.15); }
        
        /* 歷史紀錄區域滾動優化 */
        #historyList { 
            scrollbar-width: none; 
            -ms-overflow-style: none; 
            touch-action: pan-y; /* 允許上下滑動但不縮放 */
        }
        #historyList::-webkit-scrollbar { display: none; }

        .btn-active:active {
            transform: scale(0.95);
            background-color: rgba(59, 130, 246, 0.5);
        }
    </style>
</head>
<body class="p-4 font-sans">

    <div class="max-w-md w-full h-full flex flex-col space-y-3">
        <div id="mainContainer" class="bg-[#111] rounded-[2rem] overflow-hidden border border-gray-800 flex-shrink-0">
            <div id="statusBg" class="p-5 text-center bg-gray-900/50 border-b border-white/5">
                <div class="flex justify-between items-center mb-1">
                    <span id="spinCounter" class="text-[10px] font-mono text-gray-500 uppercase">Cycle: 0</span>
                    <button onclick="resetData()" class="px-2 py-0.5 rounded text-[9px] font-black bg-red-900/20 text-red-400 border border-red-900/30">RESET</button>
                </div>
                
                <div id="rankLabel" class="text-[10px] font-black tracking-[0.2em] text-gray-500 mb-1 uppercase">--- 待命中 ---</div>
                <h1 id="strategyAction" class="text-2xl font-black mb-1 text-white">等待數據輸入</h1>
                
                <div class="flex justify-center gap-3 items-center text-[10px] font-bold">
                    <span id="totalPlDisplay" class="text-gray-400">總損益: 0</span>
                    <span id="recommendSpins" class="text-blue-400">建議: -- 轉</span>
                </div>
            </div>

            <div class="p-4 space-y-4">
                <div class="grid grid-cols-4 gap-2">
                    <div onclick="setActiveInput('initialCapital')" id="boxCapital" class="data-card p-2 rounded-xl text-center cursor-pointer">
                        <p class="text-[9px] text-gray-500 mb-0.5 font-bold">本金</p>
                        <input type="number" id="initialCapital" value="1000" class="bg-transparent text-xs font-mono font-bold text-white outline-none w-full text-center pointer-events-none" readonly>
                    </div>
                    <div onclick="setActiveInput('targetGoal')" id="boxGoal" class="data-card p-2 rounded-xl text-center cursor-pointer">
                        <p class="text-[9px] text-green-500 mb-0.5 font-bold">止盈</p>
                        <input type="number" id="targetGoal" class="bg-transparent text-xs font-mono font-bold text-green-500 outline-none w-full text-center pointer-events-none" readonly>
                    </div>
                    <div onclick="setActiveInput('currentBet')" id="boxBet" class="data-card p-2 rounded-xl text-center cursor-pointer">
                        <p class="text-[9px] text-gray-500 mb-0.5 font-bold">基準注</p>
                        <input type="number" id="currentBet" value="10" class="bg-transparent text-xs font-mono font-bold text-white outline-none w-full text-center pointer-events-none" readonly>
                    </div>
                    <div onclick="setActiveInput('customSpins')" id="boxSpins" class="data-card p-2 rounded-xl text-center cursor-pointer">
                        <p class="text-[9px] text-blue-400 mb-0.5 font-bold">當前轉</p>
                        <input type="number" id="customSpins" value="100" class="bg-transparent text-xs font-mono font-bold text-blue-400 outline-none w-full text-center pointer-events-none" readonly>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div onclick="setActiveInput('startBalance')" id="boxStart" class="data-card p-4 rounded-2xl border-2 border-blue-600 text-center cursor-pointer">
                        <p id="labelStart" class="text-[10px] text-gray-500 mb-1 font-bold">前餘額</p>
                        <input type="number" id="startBalance" class="w-full bg-transparent text-2xl font-black outline-none text-center pointer-events-none" placeholder="0" readonly>
                    </div>
                    <div onclick="setActiveInput('endBalance')" id="boxEnd" class="data-card p-4 rounded-2xl border-2 border-transparent text-center cursor-pointer">
                        <p id="labelEnd" class="text-[10px] text-gray-500 mb-1 font-bold">後餘額</p>
                        <input type="number" id="endBalance" class="w-full bg-transparent text-2xl font-black outline-none text-center pointer-events-none" placeholder="0" readonly>
                    </div>
                </div>

                <div class="bg-blue-600 p-4 rounded-2xl flex justify-between items-center shadow-[0_10px_20px_rgba(37,99,235,0.3)]">
                    <div>
                        <p class="text-[10px] text-blue-100 font-bold mb-1 uppercase">RTP: <span id="rtpValue">---</span>%</p>
                        <div id="strategyBadge" class="px-2 py-0.5 bg-white/20 rounded text-[10px] font-black inline-block">等待數據</div>
                    </div>
                    <div class="text-right">
                        <p class="text-[10px] text-blue-100 font-bold mb-1">下一手建議注碼</p>
                        <p id="targetBetDisplay" class="text-4xl font-black text-white">$ ---</p>
                    </div>
                </div>

                <div class="grid grid-cols-3 gap-1.5">
                    <button onclick="pressKey('1')" class="py-3 bg-white/5 rounded-xl font-bold text-lg btn-active">1</button>
                    <button onclick="pressKey('2')" class="py-3 bg-white/5 rounded-xl font-bold text-lg btn-active">2</button>
                    <button onclick="pressKey('3')" class="py-3 bg-white/5 rounded-xl font-bold text-lg btn-active">3</button>
                    <button onclick="pressKey('4')" class="py-3 bg-white/5 rounded-xl font-bold text-lg btn-active">4</button>
                    <button onclick="pressKey('5')" class="py-3 bg-white/5 rounded-xl font-bold text-lg btn-active">5</button>
                    <button onclick="pressKey('6')" class="py-3 bg-white/5 rounded-xl font-bold text-lg btn-active">6</button>
                    <button onclick="pressKey('7')" class="py-3 bg-white/5 rounded-xl font-bold text-lg btn-active">7</button>
                    <button onclick="pressKey('8')" class="py-3 bg-white/5 rounded-xl font-bold text-lg btn-active">8</button>
                    <button onclick="pressKey('9')" class="py-3 bg-white/5 rounded-xl font-bold text-lg btn-active">9</button>
                    <button onclick="pressKey('C')" class="py-3 bg-red-900/10 text-red-500 rounded-xl font-bold btn-active">C</button>
                    <button onclick="pressKey('0')" class="py-3 bg-white/5 rounded-xl font-bold text-lg btn-active">0</button>
                    <button id="okBtn" onclick="calculate()" class="py-3 bg-blue-500 rounded-xl font-black text-white shadow-lg btn-active">確認計算</button>
                </div>
            </div>
        </div>

        <div id="historyList" class="flex-grow bg-[#111] rounded-2xl border border-white/5 overflow-y-auto"></div>
    </div>

    <script>
        // 腳本邏輯與前一版相同，已確保穩定性
        let currentInputId = 'startBalance';
        let cycleCount = 0;
        let lastRtp = null;
        let isLocked = false;

        const STRATEGIES = [
            { min: 160, label: "RANK 6 - 爆發期", action: "倍數跳躍 ⬆️ 3X", recSpins: 20, color: "#a855f7", baseM: 3.0 },
            { min: 120, label: "RANK 5 - 升溫期", action: "強力追擊 ⬆️ 2X", recSpins: 30, color: "#ec4899", baseM: 2.0 },
            { min: 95, label: "RANK 4 - 平衡期", action: "穩定守成 - 1X", recSpins: 50, color: "#22c55e", baseM: 1.0 },
            { min: 75, label: "RANK 3 - 洗盤期", action: "小注觀察 ⬇️ 0.5X", recSpins: 50, color: "#3b82f6", baseM: 0.5 },
            { min: 0, label: "RANK 1 - 極凍期", action: "減注避險 ⬇️ 0.2X", recSpins: 100, color: "#ef4444", baseM: 0.2 }
        ];

        window.onload = () => {
            updateGoal();
            setActiveInput('startBalance');
        };

        function updateGoal() {
            const cap = parseFloat(document.getElementById('initialCapital').value) || 0;
            document.getElementById('targetGoal').value = Math.floor(cap * 1.5);
        }

        function setActiveInput(id) {
            if (isLocked) return;
            currentInputId = id;
            document.querySelectorAll('.data-card').forEach(box => box.classList.remove('active-box'));
            const activeId = id === 'initialCapital' ? 'boxCapital' : id === 'targetGoal' ? 'boxGoal' : id === 'currentBet' ? 'boxBet' : id === 'customSpins' ? 'boxSpins' : id === 'startBalance' ? 'boxStart' : 'boxEnd';
            const el = document.getElementById(activeId);
            if(el) el.classList.add('active-box');
        }

        function pressKey(key) {
            if (isLocked) return;
            const input = document.getElementById(currentInputId);
            if (key === 'C') input.value = ''; else input.value += key;
            if (currentInputId === 'initialCapital') updateGoal();
            // 同步更新轉數標籤
            if (currentInputId === 'customSpins') {
                const val = input.value || '0';
                document.getElementById('labelStart').innerText = `${val}轉前`;
                document.getElementById('labelEnd').innerText = `${val}轉後`;
            }
        }

        function calculate() {
            const cap = parseFloat(document.getElementById('initialCapital').value);
            const goal = parseFloat(document.getElementById('targetGoal').value);
            const start = parseFloat(document.getElementById('startBalance').value);
            const end = parseFloat(document.getElementById('endBalance').value);
            const baseBet = parseFloat(document.getElementById('currentBet').value);
            const spins = parseFloat(document.getElementById('customSpins').value);

            if (isNaN(start) || isNaN(end) || isNaN(spins) || spins === 0) return;

            const profit = end - start;
            const rtp = ((profit + (baseBet * spins)) / (baseBet * spins)) * 100;
            const totalPl = end - cap;

            const strategy = STRATEGIES.find(s => rtp >= s.min) || STRATEGIES[STRATEGIES.length - 1];
            cycleCount++;
            
            document.getElementById('rankLabel').innerText = strategy.label;
            document.getElementById('rankLabel').style.color = strategy.color;
            document.getElementById('strategyAction').innerText = strategy.action;
            document.getElementById('strategyBadge').innerText = strategy.label;
            document.getElementById('rtpValue').innerText = rtp.toFixed(1);
            document.getElementById('recommendSpins').innerText = `建議: ${strategy.recSpins} 轉`;
            document.getElementById('totalPlDisplay').innerText = `總損益: ${totalPl.toFixed(0)}`;
            document.getElementById('totalPlDisplay').style.color = totalPl >= 0 ? '#4ade80' : '#fb7185';

            let finalBet = baseBet * strategy.baseM;
            if(lastRtp !== null && rtp > lastRtp && rtp > 90) {
                finalBet *= 1.25;
                document.getElementById('strategyAction').innerText += " (升階追擊)";
            }

            document.getElementById('targetBetDisplay').innerText = "$ " + finalBet.toFixed(1);
            addHistory(rtp, profit, finalBet.toFixed(1), strategy, spins);

            lastRtp = rtp;
            document.getElementById('startBalance').value = end;
            document.getElementById('endBalance').value = '';
            setActiveInput('endBalance');

            if (end >= goal) triggerLock(180, "🏆 止盈提款", true);
            else if (end <= cap * 0.5) triggerLock(300, "🚨 冷靜停損", false);
        }

        function addHistory(rtp, profit, nextBet, strategy, spins) {
            const list = document.getElementById('historyList');
            const row = document.createElement('div');
            row.className = 'p-3 border-b border-white/5 flex justify-between items-center text-[11px]';
            row.innerHTML = `
                <div class="flex flex-col">
                    <span class="text-gray-500">#${cycleCount} [${spins}T]</span>
                    <span style="color:${strategy.color}">${strategy.label}</span>
                </div>
                <div class="text-center font-mono font-black ${rtp>100?'text-green-400':'text-red-400'}">${rtp.toFixed(1)}%</div>
                <div class="text-right">
                    <div class="${profit>=0?'text-green-400':'text-red-400'} font-bold">${profit>=0?'+':''}${profit.toFixed(0)}</div>
                    <div class="text-blue-400 font-black">NEXT: ${nextBet}</div>
                </div>
            `;
            list.prepend(row);
        }

        function triggerLock(seconds, msg, isWin) {
            isLocked = true;
            document.getElementById('strategyAction').innerText = msg;
            const okBtn = document.getElementById('okBtn');
            let timer = seconds;
            const interval = setInterval(() => {
                okBtn.innerText = timer + "s";
                if (timer-- <= 0) {
                    clearInterval(interval);
                    isLocked = false;
                    okBtn.innerText = "確認計算";
                }
            }, 1000);
        }

        function resetData() {
            if(!confirm("確定重置？")) return;
            location.reload();
        }
    </script>
</body>
</html>
