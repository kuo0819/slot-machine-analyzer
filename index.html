<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>鋼鐵執行者 - 完全體</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; }
        .data-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); }
        .progress-bar { height: 100%; transition: width 0.5s ease; }
        .lock-overlay { animation: pulse 1s infinite !important; filter: grayscale(1) !important; pointer-events: none !important; }
        @keyframes pulse { 0% { background-color: #450a0a; } 50% { background-color: #7f1d1d; } 100% { background-color: #450a0a; } }
        .win-lock-overlay { animation: winPulse 1s infinite !important; pointer-events: none !important; }
        @keyframes winPulse { 0% { background-color: #064e3b; } 50% { background-color: #065f46; } 100% { background-color: #064e3b; } }
        body { -webkit-tap-highlight-color: transparent; background-color: #050505; color: white; overflow-x: hidden; }
        .multiplier-btn { transition: all 0.2s; border: 1px solid rgba(255,255,255,0.1); }
        .multiplier-btn:active { background-color: #2563eb; transform: scale(0.95); }
        .signal-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 4px; }
        #helpModal { backdrop-filter: blur(12px); background: rgba(0,0,0,0.85); transition: all 0.3s; }
        #historyList { scrollbar-width: none; -ms-overflow-style: none; }
        #historyList::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4 font-sans select-none pb-12">

    <button onclick="toggleHelp(true)" class="fixed bottom-6 right-6 z-40 bg-blue-600 shadow-[0_0_15px_rgba(37,99,235,0.5)] p-3 rounded-full border border-white/20 active:scale-90 transition-all">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
        </svg>
    </button>

    <div class="max-w-md w-full space-y-4">
        <div id="mainContainer" class="bg-[#111] rounded-[2.5rem] overflow-hidden border border-gray-800 shadow-2xl">
            <div id="statusBg" class="p-6 text-center bg-gray-900 border-b border-white/5 transition-all">
                <div class="flex justify-between items-center mb-1">
                    <span id="spinCounter" class="text-[10px] font-mono text-gray-500">週期: 0</span>
                    <span id="signalTag" class="px-2 py-0.5 rounded text-[10px] font-black bg-gray-700 text-white uppercase tracking-tighter">等待數據輸入</span>
                </div>
                <h1 class="text-2xl font-black mb-1 flex items-center justify-center">
                    <span id="statusIndicator" class="signal-dot bg-gray-600"></span>
                    <span id="mainStatus">系統待命</span>
                </h1>
                <p id="totalPlDisplay" class="text-[10px] font-bold text-gray-500 uppercase tracking-widest">總損益: 0</p>
                <div class="mt-4 px-4">
                    <div class="bg-white/5 h-1.5 rounded-full overflow-hidden">
                        <div id="progressBar" class="progress-bar w-0 bg-blue-500 shadow-[0_0_8px_#3b82f6]"></div>
                    </div>
                </div>
            </div>

            <div class="p-5 space-y-4">
                <div class="flex justify-between gap-2">
                    <button onclick="setFastMultiplier(1.5)" class="multiplier-btn flex-1 py-2 text-[10px] font-black rounded-xl bg-white/5 text-gray-400">1.5x</button>
                    <button onclick="setFastMultiplier(2)" class="multiplier-btn flex-1 py-2 text-[10px] font-black rounded-xl bg-white/5 text-gray-400">2.0x</button>
                    <button onclick="setFastMultiplier(3)" class="multiplier-btn flex-1 py-2 text-[10px] font-black rounded-xl bg-white/5 text-gray-400">3.0x</button>
                    <button onclick="setFastMultiplier(4)" class="multiplier-btn flex-1 py-2 text-[10px] font-black rounded-xl bg-white/5 text-gray-400">4.0x</button>
                </div>

                <div class="grid grid-cols-3 gap-2">
                    <div onclick="setActiveInput('initialCapital')" id="boxCapital" class="data-card p-2 rounded-xl text-center border-2 border-transparent">
                        <p class="text-[9px] text-gray-500 mb-1 font-bold">初始本金</p>
                        <input type="number" id="initialCapital" value="1000" class="bg-transparent text-sm font-mono font-bold text-white outline-none w-full text-center pointer-events-none" readonly>
                    </div>
                    <div onclick="setActiveInput('targetGoal')" id="boxGoal" class="data-card p-2 rounded-xl text-center border-2 border-transparent bg-green-900/10">
                        <p class="text-[9px] text-green-400 mb-1 font-bold">止盈目標</p>
                        <input type="number" id="targetGoal" class="bg-transparent text-sm font-mono font-bold text-green-400 outline-none w-full text-center pointer-events-none" readonly>
                    </div>
                    <div onclick="setActiveInput('currentBet')" id="boxBet" class="data-card p-2 rounded-xl text-center border-2 border-transparent">
                        <p class="text-[9px] text-gray-500 mb-1 font-bold">基準單注</p>
                        <input type="number" id="currentBet" value="1" class="bg-transparent text-sm font-mono font-bold text-white outline-none w-full text-center pointer-events-none" readonly>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div onclick="setActiveInput('startBalance')" id="boxStart" class="data-card p-4 rounded-2xl border-2 border-blue-600 text-center">
                        <p class="text-[10px] text-gray-500 mb-1 font-bold">100轉前</p>
                        <input type="number" id="startBalance" class="w-full bg-transparent text-2xl font-bold outline-none text-center pointer-events-none" placeholder="0" readonly>
                    </div>
                    <div onclick="setActiveInput('endBalance')" id="boxEnd" class="data-card p-4 rounded-2xl border-2 border-transparent text-center">
                        <p class="text-[10px] text-gray-500 mb-1 font-bold">100轉後</p>
                        <input type="number" id="endBalance" class="w-full bg-transparent text-2xl font-bold outline-none text-center pointer-events-none" placeholder="0" readonly>
                    </div>
                </div>

                <div class="bg-white/[0.02] p-4 rounded-3xl border border-white/10 flex justify-between items-center px-6">
                    <div class="text-center">
                        <p class="text-[9px] text-gray-500 font-bold mb-1">當前 RTP</p>
                        <p id="rtpDisplay" class="text-xl font-mono font-bold text-gray-400">---%</p>
                    </div>
                    <div class="text-right">
                        <p class="text-[9px] text-blue-500 font-bold mb-1 uppercase tracking-widest">下一手單注</p>
                        <p id="targetBetDisplay" class="text-4xl font-black text-white">$ ---</p>
                    </div>
                </div>

                <div id="keypad" class="grid grid-cols-3 gap-2">
                    <button onclick="pressKey('1')" class="py-4 bg-white/5 rounded-2xl font-bold text-xl active:scale-95">1</button>
                    <button onclick="pressKey('2')" class="py-4 bg-white/5 rounded-2xl font-bold text-xl active:scale-95">2</button>
                    <button onclick="pressKey('3')" class="py-4 bg-white/5 rounded-2xl font-bold text-xl active:scale-95">3</button>
                    <button onclick="pressKey('4')" class="py-4 bg-white/5 rounded-2xl font-bold text-xl active:scale-95">4</button>
                    <button onclick="pressKey('5')" class="py-4 bg-white/5 rounded-2xl font-bold text-xl active:scale-95">5</button>
                    <button onclick="pressKey('6')" class="py-4 bg-white/5 rounded-2xl font-bold text-xl active:scale-95">6</button>
                    <button onclick="pressKey('7')" class="py-4 bg-white/5 rounded-2xl font-bold text-xl active:scale-95">7</button>
                    <button onclick="pressKey('8')" class="py-4 bg-white/5 rounded-2xl font-bold text-xl active:scale-95">8</button>
                    <button onclick="pressKey('9')" class="py-4 bg-white/5 rounded-2xl font-bold text-xl active:scale-95">9</button>
                    <button onclick="pressKey('C')" class="py-4 bg-red-900/20 text-red-500 rounded-2xl font-bold text-lg">C</button>
                    <button onclick="pressKey('0')" class="py-4 bg-white/5 rounded-2xl font-bold text-xl">0</button>
                    <button id="okBtn" onclick="calculate()" class="py-4 bg-blue-600 rounded-2xl font-bold uppercase shadow-lg shadow-blue-900/40">確認</button>
                </div>
            </div>
        </div>

        <div class="bg-[#111] rounded-3xl border border-white/5 overflow-hidden">
            <div class="px-4 py-2 border-b border-white/5 flex justify-between">
                <span class="text-[9px] font-black text-gray-500 uppercase tracking-widest">歷史紀錄清單</span>
                <span class="text-[9px] font-black text-blue-500 uppercase">最新優先</span>
            </div>
            <div id="historyList" class="max-h-48 overflow-y-auto">
                </div>
        </div>
    </div>

    <div id="helpModal" class="fixed inset-0 z-50 flex items-center justify-center p-6 opacity-0 pointer-events-none">
        <div class="bg-[#0f0f0f] border border-blue-900/50 w-full max-w-sm rounded-[2.5rem] p-8 space-y-6 shadow-2xl relative">
            <button onclick="toggleHelp(false)" class="absolute top-6 right-6 text-gray-500 text-2xl">×</button>
            <h2 class="text-blue-400 font-black text-lg border-b border-white/10 pb-2 uppercase tracking-tight">📈 趨勢作戰手冊</h2>
            <div class="space-y-5 text-xs leading-relaxed text-gray-300">
                <section>
                    <h4 class="text-white font-bold mb-1">一、斜率判斷</h4>
                    <p>● <span class="text-green-400 font-bold">升溫：</span>RTP連續走高，吐分循環開始。</p>
                    <p>● <span class="text-red-400 font-bold">降溫：</span>RTP向下掉，吐分結束，立即縮注。</p>
                </section>
                <section>
                    <h4 class="text-white font-bold mb-1">二、區間戰略</h4>
                    <p>● <span class="text-purple-500 font-bold">爆發期(>150%)：</span>唯一追擊時機。</p>
                    <p>● <span class="text-green-500 font-bold">洗盤期(90-110%)：</span>穩定盤整區間。</p>
                    <p>● <span class="text-red-500 font-bold">極凍期(<70%)：</span>吸金警告，縮至 0.2x。</p>
                </section>
                <p class="italic text-gray-500 border-l-2 border-gray-800 pl-3">「贏錢時懂得守住獲利的人才是贏家。」</p>
            </div>
            <button onclick="toggleHelp(false)" class="w-full py-3 bg-blue-600 rounded-2xl font-bold text-white text-sm">我理解了</button>
        </div>
    </div>

    <script>
        let currentInputId = 'startBalance';
        let cycleCount = 0;
        let isLocked = false;

        function toggleHelp(show) {
            const modal = document.getElementById('helpModal');
            modal.style.opacity = show ? '1' : '0';
            modal.style.pointerEvents = show ? 'auto' : 'none';
        }

        window.onload = () => {
            const lockUntil = localStorage.getItem('lockUntil');
            if (lockUntil && Date.now() < lockUntil) startLockdown(Math.ceil((lockUntil - Date.now()) / 1000), localStorage.getItem('lockType') === 'win');
            setFastMultiplier(1.5);
            document.getElementById('startBalance').value = document.getElementById('initialCapital').value;
        };

        function setFastMultiplier(m) {
            if (isLocked) return;
            const cap = parseFloat(document.getElementById('initialCapital').value) || 0;
            document.getElementById('targetGoal').value = Math.floor(cap * m);
            document.getElementById('mainStatus').innerText = `目標：${m}x`;
        }

        function setActiveInput(id) {
            if (isLocked) return;
            currentInputId = id;
            ['boxCapital','boxGoal','boxBet','boxStart','boxEnd'].forEach(box => document.getElementById(box).style.borderColor = 'transparent');
            const activeBox = (id === 'initialCapital') ? 'boxCapital' : (id === 'targetGoal') ? 'boxGoal' : (id === 'currentBet') ? 'boxBet' : (id === 'startBalance') ? 'boxStart' : 'boxEnd';
            document.getElementById(activeBox).style.borderColor = '#2563eb';
        }

        function pressKey(key) {
            if (isLocked) return;
            const input = document.getElementById(currentInputId);
            if (key === 'C') input.value = ''; else input.value += key;
            if (currentInputId === 'initialCapital') setFastMultiplier(1.5);
        }

        function calculate() {
            if (isLocked) return;
            const capital = parseFloat(document.getElementById('initialCapital').value);
            const goal = parseFloat(document.getElementById('targetGoal').value);
            const start = parseFloat(document.getElementById('startBalance').value);
            const end = parseFloat(document.getElementById('endBalance').value);
            const bet = parseFloat(document.getElementById('currentBet').value);

            if (isNaN(start) || isNaN(end)) return;
            const profit = end - start;
            const rtp = ((profit + (bet * 100)) / (bet * 100)) * 100;
            const totalPl = end - capital;

            if (end >= goal) { triggerLock(180, "🏆 達成止盈", true); return; }
            if (end <= capital * 0.5) { triggerLock(300, "🚨 觸發止損", false); return; }

            cycleCount++;
            updateSignal(rtp);
            updateUI(rtp, totalPl, end, capital, goal);
            
            let m = (rtp < 75) ? 0.2 : (rtp > 145 ? 1.5 : 1.0);
            document.getElementById('targetBetDisplay').innerText = "$ " + (bet * m).toFixed(1);
            addHistory(rtp, profit, (bet * m).toFixed(1));

            document.getElementById('startBalance').value = end;
            document.getElementById('endBalance').value = '';
            setActiveInput('endBalance');
        }

        function updateSignal(rtp) {
            const dot = document.getElementById('statusIndicator');
            const tag = document.getElementById('signalTag');
            const status = document.getElementById('mainStatus');

            if (rtp > 150) {
                dot.className = "signal-dot bg-purple-500 shadow-[0_0_8px_#a855f7]";
                tag.innerText = "🚨 爆發期";
                tag.className = "px-2 py-0.5 rounded text-[10px] font-black bg-purple-600 text-white";
                status.innerText = "建議加注";
            } else if (rtp >= 90) {
                dot.className = "signal-dot bg-green-500 shadow-[0_0_8px_#22c55e]";
                tag.innerText = "✅ 洗盤期";
                tag.className = "px-2 py-0.5 rounded text-[10px] font-black bg-green-600 text-white";
                status.innerText = "正常觀察";
            } else {
                dot.className = "signal-dot bg-red-600 shadow-[0_0_8px_#dc2626]";
                tag.innerText = "💀 極凍期";
                tag.className = "px-2 py-0.5 rounded text-[10px] font-black bg-red-600 text-white";
                status.innerText = "減注避險";
            }
        }

        function triggerLock(seconds, msg, isWin) {
            localStorage.setItem('lockUntil', Date.now() + (seconds * 1000));
            localStorage.setItem('lockType', isWin ? 'win' : 'loss');
            startLockdown(seconds, isWin);
        }

        function startLockdown(seconds, isWin) {
            isLocked = true;
            const container = document.getElementById('mainContainer');
            const okBtn = document.getElementById('okBtn');
            container.classList.add(isWin ? 'win-lock-overlay' : 'lock-overlay');
            document.getElementById('mainStatus').innerText = isWin ? "執行提款" : "冷靜中止";

            const timer = setInterval(() => {
                const remaining = Math.ceil((localStorage.getItem('lockUntil') - Date.now()) / 1000);
                if (remaining <= 0) {
                    clearInterval(timer);
                    isLocked = false;
                    container.classList.remove('lock-overlay', 'win-lock-overlay');
                    okBtn.innerText = "確認";
                    localStorage.removeItem('lockType');
                } else {
                    okBtn.innerText = remaining + "s";
                }
            }, 1000);
        }

        function updateUI(rtp, totalPl, end, capital, goal) {
            document.getElementById('rtpDisplay').innerText = rtp.toFixed(1) + "%";
            document.getElementById('rtpDisplay').style.color = rtp > 100 ? '#4ade80' : '#ef4444';
            document.getElementById('totalPlDisplay').innerText = `總損益: ${totalPl.toFixed(0)}`;
            document.getElementById('totalPlDisplay').style.color = totalPl >= 0 ? '#4ade80' : '#ef4444';
            document.getElementById('spinCounter').innerText = `週期: ${cycleCount}`;
            let progress = ((end - (capital * 0.5)) / (goal - (capital * 0.5))) * 100;
            document.getElementById('progressBar').style.width = Math.min(Math.max(progress, 0), 100) + "%";
        }

        function addHistory(rtp, profit, target) {
            const list = document.getElementById('historyList');
            const row = document.createElement('div');
            row.className = 'p-4 border-b border-white/5 flex justify-between items-center bg-white/[0.01]';
            row.innerHTML = `<div><span class="text-gray-500">#${cycleCount}</span> <b class="ml-2 font-mono">${rtp.toFixed(1)}%</b></div><div class="${profit>=0?'text-green-400':'text-red-400'} font-bold">${profit>=0?'+':''}${profit.toFixed(0)}</div><div class="text-blue-400 font-black">$ ${target}</div>`;
            list.prepend(row);
        }
    </script>
</body>
</html>
