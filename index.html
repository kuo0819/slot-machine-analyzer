<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>鋼鐵執行者 - 波動診斷版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { touch-action: manipulation; -webkit-tap-highlight-color: transparent; -webkit-user-select: none; }
        body { background-color: #050505; color: white; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        .data-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); }
        .active-box { border-color: #3b82f6 !important; background: rgba(59, 130, 246, 0.15); box-shadow: 0 0 10px rgba(59, 130, 246, 0.2); }
        input { pointer-events: none; }
        .tab-active { color: #3b82f6; border-bottom: 2px solid #3b82f6; font-weight: 900; }
        .hidden-page { display: none; }
        /* 波動燈動畫 */
        .volt-flash { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
    </style>
</head>
<body class="p-3 font-sans">

    <div class="max-w-md w-full h-full flex flex-col mx-auto space-y-3">
        
        <div class="flex justify-around bg-[#111] rounded-xl border border-white/5 flex-shrink-0">
            <button onclick="switchPage('room')" id="tabRoom" class="flex-1 py-3 text-[11px] text-gray-500 tab-active">房間數據診斷</button>
            <button onclick="switchPage('live')" id="tabLive" class="flex-1 py-3 text-[11px] text-gray-500">測速策略執行</button>
        </div>

        <div class="bg-[#111] rounded-[2rem] border border-gray-800 overflow-hidden flex-shrink-0">
            <div id="statusHeader" class="p-4 text-center bg-gray-900/50 border-b border-white/5 relative">
                <div class="absolute top-4 right-6 flex flex-col items-center">
                    <div id="voltLight" class="w-3 h-3 rounded-full bg-gray-600 mb-1"></div>
                    <span id="voltText" class="text-[8px] font-bold text-gray-500 uppercase">VOLT</span>
                </div>

                <div id="topTag" class="text-[9px] font-black tracking-widest text-gray-500">SYSTEM ANALYZING</div>
                <h1 id="mainAction" class="text-xl font-black my-1 text-white">請輸入數據</h1>
                <div id="subText" class="text-[10px] text-blue-400 font-bold">Waiting for input...</div>
            </div>

            <div id="pageRoom" class="p-4 space-y-3">
                <div class="grid grid-cols-2 gap-2">
                    <div onclick="setActiveInput('dayRtp')" id="boxDayRtp" class="data-card p-2 rounded-xl text-center cursor-pointer">
                        <p class="text-[8px] text-gray-500 font-bold">當日 RTP (%)</p>
                        <input type="number" id="dayRtp" placeholder="0" class="bg-transparent text-sm font-bold text-white w-full text-center outline-none">
                    </div>
                    <div onclick="setActiveInput('dayBet')" id="boxDayBet" class="data-card p-2 rounded-xl text-center cursor-pointer">
                        <p class="text-[8px] text-gray-500 font-bold">當日投注 (萬)</p>
                        <input type="number" id="dayBet" placeholder="0" class="bg-transparent text-sm font-bold text-white w-full text-center outline-none">
                    </div>
                    <div onclick="setActiveInput('monthRtp')" id="boxMonthRtp" class="data-card p-2 rounded-xl text-center cursor-pointer">
                        <p class="text-[8px] text-gray-400 font-bold">30日 RTP (%)</p>
                        <input type="number" id="monthRtp" placeholder="0" class="bg-transparent text-sm font-bold text-gray-300 w-full text-center outline-none">
                    </div>
                    <div onclick="setActiveInput('monthBet')" id="boxMonthBet" class="data-card p-2 rounded-xl text-center cursor-pointer">
                        <p class="text-[8px] text-gray-400 font-bold">30日投注 (萬)</p>
                        <input type="number" id="monthBet" placeholder="0" class="bg-transparent text-sm font-bold text-gray-300 w-full text-center outline-none">
                    </div>
                </div>
                <button onclick="runDeepAnalysis()" class="w-full py-3 bg-indigo-600 rounded-xl font-black text-white shadow-lg active:scale-95 transition-transform">進行波動深度分析</button>
            </div>

            <div id="pageLive" class="p-4 space-y-4 hidden-page">
                <div class="grid grid-cols-3 gap-2 mb-1">
                    <div onclick="setActiveInput('initCap')" id="boxInitCap" class="data-card p-2 rounded-lg text-center cursor-pointer">
                        <p class="text-[8px] text-gray-500 font-bold">本金</p>
                        <input type="number" id="initCap" value="1000" class="bg-transparent text-[10px] font-bold text-white w-full text-center outline-none">
                    </div>
                    <div onclick="setActiveInput('baseBet')" id="boxBaseBet" class="data-card p-2 rounded-lg text-center cursor-pointer">
                        <p class="text-[8px] text-gray-500 font-bold">基準注</p>
                        <input type="number" id="baseBet" value="10" class="bg-transparent text-[10px] font-bold text-white w-full text-center outline-none">
                    </div>
                    <div onclick="setActiveInput('spinT')" id="boxSpinT" class="data-card p-2 rounded-lg text-center cursor-pointer">
                        <p class="text-[8px] text-blue-400 font-bold">測速轉數</p>
                        <input type="number" id="spinT" value="50" class="bg-transparent text-[10px] font-bold text-blue-400 w-full text-center outline-none">
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div onclick="setActiveInput('sBal')" id="boxSBal" class="data-card p-3 rounded-2xl border-2 border-blue-600 text-center cursor-pointer">
                        <p class="text-[9px] text-gray-500 font-bold">測速前</p>
                        <input type="number" id="sBal" class="w-full bg-transparent text-xl font-black text-center outline-none" placeholder="0">
                    </div>
                    <div onclick="setActiveInput('eBal')" id="boxEBal" class="data-card p-3 rounded-2xl border-2 border-transparent text-center cursor-pointer">
                        <p class="text-[9px] text-gray-500 font-bold">測速後</p>
                        <input type="number" id="eBal" class="w-full bg-transparent text-xl font-black text-center outline-none" placeholder="0">
                    </div>
                </div>
                <button onclick="runLiveStrategy()" class="w-full py-3 bg-blue-600 rounded-xl font-black text-white shadow-lg">執行測速策略</button>
            </div>

            <div class="p-4 pt-0 grid grid-cols-3 gap-1.5">
                <button onclick="pressKey('1')" class="py-3 bg-white/5 rounded-xl font-bold">1</button>
                <button onclick="pressKey('2')" class="py-3 bg-white/5 rounded-xl font-bold">2</button>
                <button onclick="pressKey('3')" class="py-3 bg-white/5 rounded-xl font-bold">3</button>
                <button onclick="pressKey('4')" class="py-3 bg-white/5 rounded-xl font-bold">4</button>
                <button onclick="pressKey('5')" class="py-3 bg-white/5 rounded-xl font-bold">5</button>
                <button onclick="pressKey('6')" class="py-3 bg-white/5 rounded-xl font-bold">6</button>
                <button onclick="pressKey('7')" class="py-3 bg-white/5 rounded-xl font-bold">7</button>
                <button onclick="pressKey('8')" class="py-3 bg-white/5 rounded-xl font-bold">8</button>
                <button onclick="pressKey('9')" class="py-3 bg-white/5 rounded-xl font-bold">9</button>
                <button onclick="pressKey('C')" class="py-3 bg-red-900/10 text-red-500 rounded-xl font-bold">C</button>
                <button onclick="pressKey('0')" class="py-3 bg-white/5 rounded-xl font-bold">0</button>
                <button onclick="resetAll()" class="py-3 bg-gray-800 rounded-xl font-bold text-[10px]">重置</button>
            </div>
        </div>

        <div id="historyList" class="flex-grow bg-[#111] rounded-2xl border border-white/5 overflow-y-auto p-2 space-y-2"></div>
    </div>

    <script>
        let currentInputId = 'dayRtp';
        let cycle = 0;

        function switchPage(page) {
            document.getElementById('pageRoom').classList.toggle('hidden-page', page !== 'room');
            document.getElementById('pageLive').classList.toggle('hidden-page', page !== 'live');
            document.getElementById('tabRoom').classList.toggle('tab-active', page === 'room');
            document.getElementById('tabLive').classList.toggle('tab-active', page === 'live');
            setActiveInput(page === 'room' ? 'dayRtp' : 'sBal');
        }

        function setActiveInput(id) {
            currentInputId = id;
            document.querySelectorAll('.data-card').forEach(box => box.classList.remove('active-box'));
            const boxId = 'box' + id.charAt(0).toUpperCase() + id.slice(1);
            if(document.getElementById(boxId)) document.getElementById(boxId).classList.add('active-box');
        }

        function pressKey(key) {
            const input = document.getElementById(currentInputId);
            if (!input) return;
            if (key === 'C') input.value = ''; else input.value += key;
        }

        function runDeepAnalysis() {
            const dRtp = parseFloat(document.getElementById('dayRtp').value) || 0;
            const dBet = parseFloat(document.getElementById('dayBet').value) || 0;
            const mRtp = parseFloat(document.getElementById('monthRtp').value) || 0;
            const mBet = parseFloat(document.getElementById('monthBet').value) || 0;

            if (!dRtp || !mRtp) return;

            const rtpDiff = dRtp - mRtp;
            const volLevel = Math.abs(rtpDiff); // 波動等級基準

            let res = ""; let adv = ""; let col = "#9ca3af";
            let voltCol = "#4b5563"; let voltStatus = "穩定";

            // 波動率燈光判定
            if (volLevel > 15 || (dBet > (mBet/15))) {
                voltCol = "#ef4444"; voltStatus = "狂暴";
                document.getElementById('voltLight').classList.add('volt-flash');
            } else if (volLevel > 7) {
                voltCol = "#f59e0b"; voltStatus = "升溫";
                document.getElementById('voltLight').classList.remove('volt-flash');
            } else {
                voltCol = "#22c55e"; voltStatus = "穩定";
                document.getElementById('voltLight').classList.remove('volt-flash');
            }

            // 診斷邏輯
            if (rtpDiff > 5 && mRtp < 97) {
                res = "黃金起跳房 🚀";
                adv = "波動率升溫且蓄水突破，強烈進場訊號";
                col = "#a855f7";
            } else if (dRtp < 88 && dBet > (mBet/20)) {
                res = "強吸分陷阱 ⛔";
                adv = "高波動吃分狀態，投注量大但無回饋";
                col = "#ef4444";
            } else {
                res = "數據平穩房 ⚖️";
                adv = "波動率低，適合固定注碼磨免遊";
                col = "#22c55e";
            }

            // 更新燈光
            const vLight = document.getElementById('voltLight');
            const vText = document.getElementById('voltText');
            vLight.style.backgroundColor = voltCol;
            vLight.style.boxShadow = `0 0 10px ${voltCol}`;
            vText.innerText = voltStatus;
            vText.style.color = voltCol;

            updateStatus("深度波動診斷", res, adv, col);
            addHistory("深度診斷", `波動:${voltStatus}`, res, col);
        }

        function runLiveStrategy() {
            const bet = parseFloat(document.getElementById('baseBet').value) || 0;
            const s = parseFloat(document.getElementById('sBal').value) || 0;
            const e = parseFloat(document.getElementById('eBal').value) || 0;
            const t = parseFloat(document.getElementById('spinT').value) || 50;
            if (!s || !e) return;

            const rtp = ((e - s + (bet * t)) / (bet * t)) * 100;
            let m = 1.0; let res = "平打觀察"; let col = "#3b82f6";

            if (rtp >= 160) { m = 3.0; res = "倍數跳躍 3X"; col = "#a855f7"; }
            else if (rtp >= 120) { m = 2.0; res = "強力追擊 2X"; col = "#ec4899"; }
            else if (rtp < 80) { m = 0.2; res = "避險模式"; col = "#ef4444"; }

            updateStatus("測速執行結果", `$ ${(bet * m).toFixed(1)}`, res, col);
            addHistory(`測速 #${++cycle}`, `${rtp.toFixed(1)}%`, res, col);
            document.getElementById('sBal').value = e;
            document.getElementById('eBal').value = '';
            setActiveInput('eBal');
        }

        function updateStatus(tag, main, sub, col) {
            document.getElementById('topTag').innerText = tag;
            document.getElementById('mainAction').innerText = main;
            document.getElementById('mainAction').style.color = col;
            document.getElementById('subText').innerText = sub;
            document.getElementById('subText').style.color = col;
        }

        function addHistory(type, data, res, col) {
            const list = document.getElementById('historyList');
            const row = document.createElement('div');
            row.className = 'p-3 bg-white/5 rounded-xl border-l-4 flex justify-between items-center text-[10px]';
            row.style.borderColor = col;
            row.innerHTML = `<div><span class="text-gray-500">${type}: ${data}</span><br><b style="color:${col}">${res}</b></div><div class="text-gray-600 font-mono">${new Date().toLocaleTimeString()}</div>`;
            list.prepend(row);
        }

        function resetAll() { if(confirm("確定重置數據？")) location.reload(); }
    </script>
</body>
</html>
